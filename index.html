<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Payment Tracker</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- html2canvas for Image Download -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <!-- html2pdf for PDF Download -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    
    :root {
      --primary: #4f46e5;
      --bg-color: #f1f5f9;
    }

    /* মোবাইল স্ক্রিনের উচ্চতা ফিক্স করার জন্য আধুনিক CSS */
    html, body {
      height: 100%;
      height: 100dvh; /* Dynamic Viewport Height */
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: none;
    }

    ::-webkit-scrollbar { display: none; }
    
    .tab-content { display: none; animation: fadeIn 0.3s ease-in-out; }
    .tab-content.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .input-field {
      width: 100%;
      padding: 12px 16px;
      background-color: #ffffff;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
      transition: all 0.2s;
    }
    .input-field:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }
    
    .calc-input { text-align: center; font-weight: 600; }

    .nav-item { color: #94a3b8; transition: all 0.2s; }
    .nav-item.active { color: var(--primary); transform: translateY(-2px); }
    .nav-item.active .nav-icon-bg { background-color: #e0e7ff; border-radius: 12px; padding: 4px 16px; }
    
    .loader {
      border: 3px solid #f3f3f3; border-radius: 50%; border-top: 3px solid #ffffff;
      width: 20px; height: 20px; animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="text-slate-800 antialiased flex flex-col overflow-hidden">

  <!-- Top App Bar -->
  <header class="bg-indigo-600 text-white pt-10 pb-4 px-5 shadow-md flex justify-between items-center z-10 shrink-0">
    <div>
      <div class="flex items-center gap-2 mb-0.5">
        <h1 class="text-xl font-bold tracking-wide">Payment Tracker</h1>
        <!-- Connection Indicator Dot -->
        <span id="connIndicator" class="flex h-2.5 w-2.5 relative" title="Checking connection...">
          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-slate-400 opacity-75"></span>
          <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-slate-500"></span>
        </span>
      </div>
      <p class="text-indigo-200 text-xs font-medium" id="syncStatus"><i class="fa-solid fa-arrows-rotate fa-spin"></i> Initializing...</p>
    </div>
    <div class="bg-indigo-500/50 h-10 w-10 rounded-full flex items-center justify-center">
      <i class="fa-solid fa-user-tie text-lg"></i>
    </div>
  </header>

  <!-- Main Scrollable Content -->
  <!-- pb-32 দেওয়া হয়েছে যেন বাটনটি নিচের মেনুর কারণে ঢেকে না যায় -->
  <main class="flex-1 overflow-y-auto pb-32 px-4 pt-5" id="main-scroll">
    
    <div id="tab-new" class="tab-content active space-y-5 max-w-md mx-auto">
      <form id="paymentForm" class="space-y-5">
        
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 space-y-4">
          <h2 class="text-sm font-bold text-slate-800 border-b border-slate-100 pb-2 mb-3">
            <i class="fa-solid fa-file-invoice text-indigo-500 mr-1"></i> Basic Details
          </h2>
          <div>
            <label class="block text-xs font-semibold text-slate-500 mb-1.5 ml-1">Date</label>
            <input type="date" id="dateInput" required class="input-field text-slate-700 font-medium">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 mb-1.5 ml-1">Customer Name</label>
            <input type="text" id="userName" placeholder="Enter full name" required class="input-field">
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-xs font-semibold text-slate-500 mb-1.5 ml-1">Method</label>
              <select id="method" class="input-field bg-white appearance-none">
                <option value="bKash">bKash</option>
                <option value="Nagad">Nagad</option>
                <option value="Rocket">Rocket</option>
                <option value="Binance">Binance</option>
              </select>
            </div>
            <div>
              <label class="block text-xs font-semibold text-slate-500 mb-1.5 ml-1">Account A/C</label>
              <input type="tel" id="number" placeholder="017XXXXXXX" required class="input-field font-mono text-sm">
            </div>
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 mb-1.5 ml-1">Transaction ID <span class="font-normal opacity-70">(Optional)</span></label>
            <input type="text" id="trxId" placeholder="Paste TrxID" class="input-field font-mono text-sm uppercase">
          </div>
        </div>

        <div class="bg-blue-50 p-5 rounded-2xl border border-blue-100">
          <div class="flex justify-between items-center mb-3">
            <h3 class="font-bold text-blue-800 text-sm"><i class="fa-solid fa-gamepad mr-1"></i> 1000x ID</h3>
            <span class="text-xs font-bold bg-blue-200 text-blue-800 px-2 py-1 rounded-md" id="sub1000x">৳ 0</span>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-[10px] font-bold text-blue-500 uppercase mb-1 text-center">Quantity</label>
              <input type="number" id="qty1000x" placeholder="0" min="0" class="input-field calc-input border-blue-200 focus:border-blue-500">
            </div>
            <div>
              <label class="block text-[10px] font-bold text-blue-500 uppercase mb-1 text-center">Rate (৳)</label>
              <input type="number" id="rate1000x" placeholder="0.00" min="0" step="0.01" class="input-field calc-input border-blue-200 focus:border-blue-500">
            </div>
          </div>
        </div>

        <div class="bg-purple-50 p-5 rounded-2xl border border-purple-100">
          <div class="flex justify-between items-center mb-3">
            <h3 class="font-bold text-purple-800 text-sm"><i class="fa-solid fa-gamepad mr-1"></i> 615x ID</h3>
            <span class="text-xs font-bold bg-purple-200 text-purple-800 px-2 py-1 rounded-md" id="sub615x">৳ 0</span>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-[10px] font-bold text-purple-500 uppercase mb-1 text-center">Quantity</label>
              <input type="number" id="qty615x" placeholder="0" min="0" class="input-field calc-input border-purple-200 focus:border-purple-500">
            </div>
            <div>
              <label class="block text-[10px] font-bold text-purple-500 uppercase mb-1 text-center">Rate (৳)</label>
              <input type="number" id="rate615x" placeholder="0.00" min="0" step="0.01" class="input-field calc-input border-purple-200 focus:border-purple-500">
            </div>
          </div>
        </div>

        <div class="pt-2 pb-6">
          <div class="bg-slate-900 text-white p-4 rounded-t-2xl flex justify-between items-center">
            <span class="text-sm font-medium opacity-80 uppercase tracking-wider">Grand Total</span>
            <span id="grandTotalDisplay" class="text-2xl font-bold tracking-tight text-emerald-400">৳ 0</span>
          </div>
          <button type="submit" id="submitBtn" class="w-full py-4 bg-indigo-600 active:bg-indigo-700 text-white font-bold rounded-b-2xl transition-colors shadow-lg shadow-indigo-200 flex justify-center items-center gap-2 text-lg">
            <i class="fa-solid fa-check-circle"></i> Save Record
          </button>
        </div>
      </form>
    </div>

    <div id="tab-history" class="tab-content space-y-4 max-w-md mx-auto">
      <div class="sticky top-0 bg-slate-100 pt-1 pb-3 z-10">
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
            <i class="fa-solid fa-magnifying-glass"></i>
          </div>
          <input type="text" id="searchInput" placeholder="Search name or date..." class="w-full pl-11 pr-4 py-3.5 bg-white border border-slate-200 rounded-xl focus:border-indigo-500 outline-none shadow-sm text-sm font-medium">
        </div>
      </div>

      <div class="flex justify-between items-center px-1">
        <h2 class="text-sm font-bold text-slate-600">Saved Records</h2>
        <span id="recordCount" class="bg-indigo-100 text-indigo-800 text-xs font-bold px-2 py-1 rounded-full">0</span>
      </div>

      <div id="emptyState" class="hidden bg-white p-10 text-center rounded-2xl border border-slate-200 shadow-sm mt-4">
        <div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-3">
          <i class="fa-solid fa-box-open text-2xl text-slate-300"></i>
        </div>
        <p class="font-medium text-slate-500 text-sm">No records found yet.</p>
        <p class="text-xs text-slate-400 mt-1">Add a new entry to see it here.</p>
      </div>

      <div id="recordsContainer" class="space-y-4 pb-6"></div>
    </div>
  </main>

  <!-- Bottom Navigation (Fixed Height) -->
  <nav class="bg-white border-t border-slate-200 flex justify-around items-center pt-3 pb-5 shrink-0 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-20 relative">
    <button onclick="switchTab('new')" id="nav-new" class="nav-item active flex flex-col items-center gap-1 w-20 pt-1">
      <div class="nav-icon-bg flex flex-col items-center"><i class="fa-solid fa-plus text-lg"></i></div>
      <span class="text-[10px] font-bold uppercase mt-1">New Entry</span>
    </button>
    <button onclick="switchTab('history')" id="nav-history" class="nav-item flex flex-col items-center gap-1 w-20 pt-1">
      <div class="nav-icon-bg flex flex-col items-center"><i class="fa-solid fa-list text-lg"></i></div>
      <span class="text-[10px] font-bold uppercase mt-1">History</span>
    </button>
  </nav>

  <div id="toast-container" class="fixed top-14 left-0 right-0 z-50 flex flex-col items-center gap-2 pointer-events-none px-4"></div>

  <div id="confirm-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center opacity-0 transition-opacity duration-300 px-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-xs p-6 transform scale-95 transition-transform duration-300 text-center">
      <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4 text-red-500 text-3xl">
        <i class="fa-solid fa-trash-can"></i>
      </div>
      <h3 class="text-lg font-bold text-slate-800 mb-1">মুছে ফেলতে চান?</h3>
      <p class="text-slate-500 mb-6 text-sm">আপনি কি নিশ্চিত যে এই রেকর্ডটি ডিলিট করতে চান? এটি আর ফেরত পাওয়া যাবে না।</p>
      <div class="flex gap-3">
        <button id="confirm-cancel" class="flex-1 py-3 text-slate-600 bg-slate-100 font-bold rounded-xl active:bg-slate-200 transition-colors text-sm">না</button>
        <button id="confirm-ok" class="flex-1 py-3 bg-red-500 text-white font-bold rounded-xl active:bg-red-600 transition-colors text-sm shadow-md shadow-red-200">হ্যাঁ, মুছুন</button>
      </div>
    </div>
  </div>

  <script>
    // ==========================================
    // GOOGLE SHEETS URL
    // ==========================================
    const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbwLo4sl_VxRbxkvp3wXbN0k0jh2NhOJSR6-YxXXXCdtiG3kYgOasAEKEAcZxzpQBuRg_g/exec"; 
    
    const STORAGE_KEY = 'paymentTrackerMobile_Data';
    let recordsData = [];
    let editingId = null;

    // --- ID Generation Logic (Hidden from UI) ---
    const getNextId = () => {
      if (recordsData.length === 0) return 1;
      const ids = recordsData.map(r => Number(r.id) || 0);
      return Math.max(...ids) + 1;
    };

    // --- Connection Status Logic ---
    const updateConnectionUI = (isOnline) => {
      const connIndicator = document.getElementById('connIndicator');
      const syncStatus = document.getElementById('syncStatus');
      
      if(isOnline) {
        connIndicator.innerHTML = `
          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
          <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500 shadow-[0_0_8px_rgba(52,211,153,0.8)]"></span>
        `;
        syncStatus.innerHTML = '<i class="fa-solid fa-link text-emerald-300"></i> Connected to Sheet';
      } else {
        connIndicator.innerHTML = `
          <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.8)]"></span>
        `;
        syncStatus.innerHTML = '<i class="fa-solid fa-link-slash text-red-300"></i> Not Connected (Offline)';
      }
    };

    // Fetches data directly from Google Sheet to ensure persistence
    const syncDataFromSheet = async () => {
      if(!navigator.onLine) {
        updateConnectionUI(false);
        loadLocalData();
        return;
      }
      try {
        document.getElementById('syncStatus').innerHTML = '<i class="fa-solid fa-arrows-rotate fa-spin text-indigo-300"></i> Fetching data...';
        const response = await fetch(GOOGLE_SHEET_URL);
        const result = await response.json();
        
        if (result.status === 'success' && result.data) {
          recordsData = result.data;
          saveLocalData(); // Save fetched data locally
          updateConnectionUI(true);
        } else {
          updateConnectionUI(false);
        }
      } catch(e) {
        console.error("Fetch from sheet failed:", e);
        updateConnectionUI(false);
        loadLocalData(); // Fallback to local
      }
    };

    window.addEventListener('online', syncDataFromSheet);
    window.addEventListener('offline', () => updateConnectionUI(false));

    const formatDate = (dateString) => {
      if(!dateString) return "";
      const d = new Date(dateString);
      const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
      return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
    };

    const setTodayDate = () => {
      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2, '0');
      const dd = String(today.getDate()).padStart(2, '0');
      document.getElementById('dateInput').value = `${yyyy}-${mm}-${dd}`;
    };

    const switchTab = (tabName) => {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      document.getElementById(`tab-${tabName}`).classList.add('active');
      document.getElementById(`nav-${tabName}`).classList.add('active');
      document.getElementById('main-scroll').scrollTo(0, 0);
      if(tabName === 'history') renderRecords();
    };

    const showToast = (message, type = 'success') => {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      const bg = type === 'error' ? 'bg-red-500' : 'bg-emerald-500';
      const icon = type === 'error' ? 'fa-circle-exclamation' : 'fa-circle-check';
      toast.className = `${bg} text-white px-5 py-3 rounded-full shadow-lg transform transition-all duration-300 -translate-y-10 opacity-0 flex items-center gap-2 font-medium text-sm pointer-events-auto w-auto max-w-sm`;
      toast.innerHTML = `<i class="fa-solid ${icon}"></i> ${message}`;
      container.appendChild(toast);
      setTimeout(() => { toast.classList.remove('-translate-y-10', 'opacity-0'); }, 10);
      setTimeout(() => { toast.classList.add('-translate-y-10', 'opacity-0'); setTimeout(() => toast.remove(), 300); }, 3000);
    };

    let confirmCallback = null;
    const showConfirmModal = (callback) => {
      const modal = document.getElementById('confirm-modal');
      modal.classList.remove('hidden');
      setTimeout(() => {
        modal.classList.remove('opacity-0');
        modal.querySelector('div').classList.remove('scale-95');
      }, 10);
      confirmCallback = callback;
    };
    const closeConfirmModal = () => {
      const modal = document.getElementById('confirm-modal');
      modal.classList.add('opacity-0');
      modal.querySelector('div').classList.add('scale-95');
      setTimeout(() => { modal.classList.add('hidden'); }, 300);
    };
    document.getElementById('confirm-cancel').addEventListener('click', closeConfirmModal);
    document.getElementById('confirm-ok').addEventListener('click', () => {
      if(confirmCallback) confirmCallback();
      closeConfirmModal();
    });

    const renderRecords = () => {
      const recordsContainer = document.getElementById('recordsContainer');
      const recordCount = document.getElementById('recordCount');
      const searchInput = document.getElementById('searchInput');
      const term = searchInput.value.toLowerCase().trim();
      
      const filtered = recordsData.filter(r => 
        (r.displayDate && r.displayDate.toLowerCase().includes(term)) || 
        r.userName.toLowerCase().includes(term) || r.number.includes(term)
      );
      
      recordCount.innerText = filtered.length;

      if (filtered.length === 0) { 
        recordsContainer.innerHTML = ''; 
        document.getElementById('emptyState').classList.remove('hidden'); 
        return; 
      }
      document.getElementById('emptyState').classList.add('hidden');
      
      let html = '';
      filtered.forEach(record => {
        const renderAction = (type, total, status) => {
          if(total === 0) return '';
          let isPaid = status === 'Paid';
          let statusBadge = `<span class="px-2.5 py-1 text-[10px] font-bold rounded-md flex items-center gap-1 ${isPaid ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'}"><i class="fa-solid ${isPaid ? 'fa-check' : 'fa-clock'}"></i> ${status}</span>`;
          let actionBtns = status === 'Pending' ? `
            <div class="flex gap-1.5 mt-2 w-full">
              <button onclick="updateStatus(${record.id}, '${type}', 'Paid')" class="flex-1 py-1.5 bg-emerald-50 text-emerald-600 border border-emerald-200 rounded text-xs font-bold active:bg-emerald-100">Paid</button>
              <button onclick="updateStatus(${record.id}, '${type}', 'Rejected')" class="flex-1 py-1.5 bg-red-50 text-red-600 border border-red-200 rounded text-xs font-bold active:bg-red-100">Reject</button>
            </div>` : '';
          return `<div class="p-3 rounded-xl border ${type === '1000x' ? 'bg-blue-50/30 border-blue-100' : 'bg-purple-50/30 border-purple-100'} mt-2">
            <div class="flex justify-between items-center"><span class="text-xs font-bold text-slate-700">${type} ID: <span class="text-slate-500">${record['qty'+type]}x৳${record['rate'+type]}</span></span>
            <div class="flex items-center gap-2"><span class="text-sm font-black text-slate-800">৳${total.toLocaleString()}</span>${statusBadge}</div></div>${actionBtns}</div>`;
        };

        const mBadge = { bKash: 'bg-pink-100 text-pink-700', Nagad: 'bg-orange-100 text-orange-700', Rocket: 'bg-purple-100 text-purple-700', Binance: 'bg-yellow-100 text-yellow-800' }[record.method] || 'bg-slate-100 text-slate-700';

        html += `
          <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 relative overflow-hidden">
            <div class="absolute left-0 top-0 bottom-0 w-1 bg-indigo-500"></div>
            <div class="flex justify-between items-start mb-2">
              <div>
                <h3 class="text-base font-bold text-slate-800 leading-tight">${record.userName}</h3>
                <p class="text-[11px] text-slate-500 font-medium mt-0.5"><i class="fa-regular fa-calendar-days"></i> ${record.displayDate}</p>
              </div>
              <div class="text-right">
                <p class="text-[10px] uppercase font-bold text-slate-400">Total</p>
                <p class="text-lg font-black text-indigo-600 leading-none">৳${record.grandTotal.toLocaleString()}</p>
              </div>
            </div>
            <div class="flex items-center gap-2 mt-2 mb-3">
              <span class="${mBadge} px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wide">${record.method}</span>
              <span class="text-xs font-mono font-bold text-slate-600">${record.number}</span>
            </div>
            ${record.trxId ? `<div class="bg-slate-50 border border-slate-100 rounded-md px-2 py-1.5 text-[11px] font-mono text-slate-500 mb-2">TrxID: <span class="text-slate-800 font-semibold">${record.trxId}</span></div>` : ''}
            <div class="mb-3">${renderAction('1000x', record.total1000x, record.status1000x)}${renderAction('615x', record.total615x, record.status615x)}</div>
            
            <div class="grid grid-cols-4 gap-2 border-t border-slate-100 pt-3">
              <button onclick="editRecord(${record.id})" class="col-span-1 py-2 bg-slate-50 text-slate-600 text-[10px] font-bold rounded-lg border border-slate-200 active:bg-slate-100"><i class="fa-solid fa-pen"></i> Edit</button>
              <button onclick="deleteRecord(${record.id})" class="col-span-1 py-2 bg-red-50 text-red-600 text-[10px] font-bold rounded-lg border border-red-200 active:bg-red-100"><i class="fa-solid fa-trash-can"></i> Del</button>
              <button onclick="downloadReceipt(${record.id})" class="col-span-1 py-2 bg-slate-800 text-white text-[10px] font-bold rounded-lg active:bg-slate-900 shadow-sm"><i class="fa-regular fa-image"></i> IMG</button>
              <button onclick="downloadPDF(${record.id})" class="col-span-1 py-2 bg-indigo-600 text-white text-[10px] font-bold rounded-lg active:bg-indigo-700 shadow-sm"><i class="fa-solid fa-file-pdf"></i> PDF</button>
            </div>
          </div>`;
      });
      document.getElementById('recordsContainer').innerHTML = html;
    };

    const loadLocalData = () => {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) recordsData = JSON.parse(saved);
      } catch (err) {}
      renderRecords();
    };

    const saveLocalData = () => {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(recordsData));
      renderRecords();
    };

    const sendActionToSheet = async (actionType, recordData) => {
      const syncStatus = document.getElementById('syncStatus');
      syncStatus.innerHTML = '<i class="fa-solid fa-arrows-rotate fa-spin text-indigo-300"></i> Syncing...';

      try {
        await fetch(GOOGLE_SHEET_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ action: actionType, data: recordData })
        });
        saveLocalData();
        syncStatus.innerHTML = '<i class="fa-solid fa-cloud-check text-emerald-300"></i> Synced Successfully';
        setTimeout(() => updateConnectionUI(navigator.onLine), 3000);
      } catch (error) {
        console.error("Sheet Sync Error: ", error);
        saveLocalData();
        updateConnectionUI(false); 
      }
    };

    const form = document.getElementById('paymentForm');
    const dateInput = document.getElementById('dateInput');
    const userNameInput = document.getElementById('userName');
    const methodInput = document.getElementById('method');
    const numberInput = document.getElementById('number');
    const trxIdInput = document.getElementById('trxId');
    const qty1000x = document.getElementById('qty1000x');
    const rate1000x = document.getElementById('rate1000x');
    const qty615x = document.getElementById('qty615x');
    const rate615x = document.getElementById('rate615x');

    const calculateTotals = () => {
      const t1000x = (Number(qty1000x.value) || 0) * (Number(rate1000x.value) || 0);
      const t615x = (Number(qty615x.value) || 0) * (Number(rate615x.value) || 0);
      const total = t1000x + t615x;
      document.getElementById('sub1000x').innerText = `৳ ${t1000x.toLocaleString()}`;
      document.getElementById('sub615x').innerText = `৳ ${t615x.toLocaleString()}`;
      document.getElementById('grandTotalDisplay').innerText = `৳ ${total.toLocaleString()}`;
      return { t1000x, t615x, total };
    };

    document.querySelectorAll('.calc-input').forEach(input => input.addEventListener('input', calculateTotals));

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const totals = calculateTotals();
      if (totals.total === 0) return showToast("দয়া করে পরিমাণ এবং রেট দিন", "error");

      const btn = document.getElementById('submitBtn');
      btn.innerHTML = '<div class="loader"></div> <span class="ml-2">Saving...</span>';
      btn.disabled = true;

      const rawDate = dateInput.value;
      const formattedDate = formatDate(rawDate);

      const recordToSave = {
        id: editingId || getNextId(), // Generates sequential ID starting from 1
        date: rawDate,
        displayDate: formattedDate,
        userName: userNameInput.value,
        method: methodInput.value,
        number: numberInput.value,
        trxId: trxIdInput.value.trim(),
        qty1000x: Number(qty1000x.value) || 0,
        rate1000x: Number(rate1000x.value) || 0,
        total1000x: totals.t1000x,
        qty615x: Number(qty615x.value) || 0,
        rate615x: Number(rate615x.value) || 0,
        total615x: totals.t615x,
        grandTotal: totals.total,
        status1000x: totals.t1000x > 0 ? 'Pending' : 'N/A',
        status615x: totals.t615x > 0 ? 'Pending' : 'N/A'
      };

      if (editingId) {
        const index = recordsData.findIndex(r => r.id === editingId);
        if (index !== -1) {
          recordToSave.status1000x = recordsData[index].status1000x;
          recordToSave.status615x = recordsData[index].status615x;
          recordsData[index] = recordToSave;
        }
        sendActionToSheet('updateRecord', recordToSave).then(() => {
          showToast("Record Updated!", "success");
          resetForm();
        });
      } else {
        recordsData.unshift(recordToSave);
        sendActionToSheet('addRecord', recordToSave).then(() => {
          showToast("New Record Saved!", "success");
          resetForm();
        });
      }
    });

    const resetForm = () => {
      editingId = null;
      form.reset();
      setTodayDate();
      calculateTotals();
      const btn = document.getElementById('submitBtn');
      btn.innerHTML = '<i class="fa-solid fa-check-circle"></i> Save Record';
      btn.className = "w-full py-4 bg-indigo-600 active:bg-indigo-700 text-white font-bold rounded-b-2xl transition-colors shadow-lg shadow-indigo-200 flex justify-center items-center gap-2 text-lg";
      btn.disabled = false;
      switchTab('history');
    };

    window.editRecord = (id) => {
      const r = recordsData.find(r => r.id === id);
      if (!r) return;
      editingId = id;
      dateInput.value = r.date;
      userNameInput.value = r.userName;
      methodInput.value = r.method;
      numberInput.value = r.number;
      trxIdInput.value = r.trxId || '';
      qty1000x.value = r.qty1000x || '';
      rate1000x.value = r.rate1000x || '';
      qty615x.value = r.qty615x || '';
      rate615x.value = r.rate615x || '';
      
      calculateTotals();
      switchTab('new');
      
      const btn = document.getElementById('submitBtn');
      btn.innerHTML = '<i class="fa-solid fa-pen-to-square"></i> Update Record';
      btn.className = "w-full py-4 bg-amber-500 active:bg-amber-600 text-white font-bold rounded-b-2xl transition-colors shadow-lg shadow-amber-200 flex justify-center items-center gap-2 text-lg";
    };

    window.deleteRecord = (id) => {
      showConfirmModal(() => {
        recordsData = recordsData.filter(r => r.id !== id);
        renderRecords(); 
        sendActionToSheet('deleteRecord', { id: id }).then(() => {
          showToast("Record Deleted", "success");
        });
      });
    };

    window.updateStatus = (id, type, status) => {
      const idx = recordsData.findIndex(r => r.id === id);
      if (idx !== -1) {
        if (type === '1000x') recordsData[idx].status1000x = status;
        if (type === '615x') recordsData[idx].status615x = status;
        sendActionToSheet('updateRecord', recordsData[idx]);
        saveLocalData();
      }
    };

    document.getElementById('searchInput').addEventListener('input', renderRecords);

    // ==========================================
    // HTML GENERATOR FOR RECEIPTS
    // ==========================================
    const generateReceiptHTML = (record, isFullyPaid) => {
      return `
        <div id="receiptContent" style="width: 540px; padding: 40px; background: #ffffff; font-family: 'Inter', sans-serif; color: #0f172a;">
          <table style="width: 100%; border-bottom: 2px solid #f1f5f9; padding-bottom: 25px; margin-bottom: 30px; border-collapse: collapse;">
            <tr>
              <td style="vertical-align: middle;">
                <h1 style="margin: 0; font-size: 26px; font-weight: 800; letter-spacing: -0.5px;">RECEIPT</h1>
                <div style="margin-top: 4px;">
                  ${isFullyPaid 
                    ? '<span style="color: #059669; font-size: 14px; font-weight: 800; letter-spacing: 0.5px;">Payment Confirmed</span>' 
                    : '<span style="color: #d97706; font-size: 14px; font-weight: 800; letter-spacing: 0.5px;">Payment Pending</span>'}
                </div>
              </td>
              <td style="vertical-align: middle; text-align: right;">
                <div style="color: #64748b; font-size: 10px; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; margin-bottom: 4px;">DATE</div>
                <div style="font-size: 16px; font-weight: 800; color: #0f172a;">${record.displayDate || 'N/A'}</div>
              </td>
            </tr>
          </table>

          ${record.trxId ? `
          <table style="width: 100%; margin-bottom: 30px; border-collapse: collapse;">
            <tr>
              <td style="background: #ecfdf5; border: 1.5px dashed #10b981; padding: 18px; border-radius: 12px; text-align: center;">
                <p style="margin: 0; color: #047857; font-size: 12px; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; margin-bottom: 4px;">TRANSACTION ID</p>
                <p style="margin: 0; font-size: 20px; font-weight: 800; color: #064e3b; font-family: monospace;">${record.trxId}</p>
              </td>
            </tr>
          </table>
          ` : ''}

          <table style="width: 100%; background: #f8fafc; border-radius: 12px; border: 1.5px solid #e2e8f0; margin-bottom: 40px; border-collapse: collapse;">
            <tr>
              <td style="width: 50%; padding: 25px; border-right: 2px solid #e2e8f0; text-align: center; vertical-align: top;">
                <p style="margin: 0 0 8px 0; color: #64748b; font-size: 11px; text-transform: uppercase; font-weight: 800;">CUSTOMER NAME</p>
                <p style="margin: 0; font-size: 20px; font-weight: 800; color: #0f172a;">${record.userName}</p>
              </td>
              <td style="width: 50%; padding: 25px; text-align: center; vertical-align: top;">
                <p style="margin: 0 0 8px 0; color: #64748b; font-size: 11px; text-transform: uppercase; font-weight: 800;">ACCOUNT DETAILS</p>
                <p style="margin: 0; font-size: 18px; font-weight: 800; color: #0f172a; margin-bottom: 2px;">${record.method}</p>
                <p style="margin: 0; color: #2563eb; font-weight: 900; font-size: 18px; font-family: monospace;">${record.number}</p>
              </td>
            </tr>
          </table>

          <table style="width: 100%; border-collapse: collapse; margin-bottom: 10px;">
            <tr>
              <td style="padding-bottom: 12px; font-size: 12px; color: #64748b; text-transform: uppercase; font-weight: 800;">ITEM DETAILS</td>
              <td style="padding-bottom: 12px; font-size: 12px; color: #64748b; text-transform: uppercase; font-weight: 800; text-align: center; width: 150px;">QTY X RATE</td>
              <td style="padding-bottom: 12px; font-size: 12px; color: #64748b; text-transform: uppercase; font-weight: 800; text-align: right; width: 100px;">TOTAL</td>
            </tr>
          </table>
          <div style="border-bottom: 2px solid #e2e8f0; margin-bottom: 15px;"></div>

          <table style="width: 100%; border-collapse: collapse; margin-bottom: 40px;">
            <tbody>
              ${record.total1000x > 0 ? `
              <tr>
                <td style="padding: 18px 0; vertical-align: middle;">
                  <span style="font-weight: 800; font-size: 16px;">1000x ID</span><br>
                  <div style="margin-top: 6px;">
                    <span style="color: ${record.status1000x === 'Paid' ? '#059669' : '#d97706'}; font-weight: 800; font-size: 11px; letter-spacing: 0.5px;">${record.status1000x === 'Paid' ? 'PAID' : 'PENDING'}</span>
                  </div>
                </td>
                <td style="padding: 18px 0; text-align: center; color: #475569; font-weight: 700; font-size: 17px;">${record.qty1000x} <span style="margin: 0 8px; color: #94a3b8; font-weight: 500;">×</span> ৳${record.rate1000x}</td>
                <td style="padding: 18px 0; text-align: right; font-weight: 800; font-size: 18px;">৳${record.total1000x.toLocaleString('en-US')}</td>
              </tr>
              <tr><td colspan="3" style="border-bottom: 1px solid #f1f5f9;"></td></tr>
              ` : ''}
              ${record.total615x > 0 ? `
              <tr>
                <td style="padding: 18px 0; vertical-align: middle;">
                  <span style="font-weight: 800; font-size: 16px;">615x ID</span><br>
                  <div style="margin-top: 6px;">
                    <span style="color: ${record.status615x === 'Paid' ? '#059669' : '#d97706'}; font-weight: 800; font-size: 11px; letter-spacing: 0.5px;">${record.status615x === 'Paid' ? 'PAID' : 'PENDING'}</span>
                  </div>
                </td>
                <td style="padding: 18px 0; text-align: center; color: #475569; font-weight: 700; font-size: 17px;">${record.qty615x} <span style="margin: 0 8px; color: #94a3b8; font-weight: 500;">×</span> ৳${record.rate615x}</td>
                <td style="padding: 18px 0; text-align: right; font-weight: 800; font-size: 18px;">৳${record.total615x.toLocaleString('en-US')}</td>
              </tr>
              <tr><td colspan="3" style="border-bottom: 1px solid #f1f5f9;"></td></tr>
              ` : ''}
            </tbody>
          </table>

          <table style="width: 100%; background: #0f172a; border-radius: 14px; border-collapse: collapse;">
            <tr>
              <td style="padding: 24px 30px; color: #94a3b8; font-size: 18px; font-weight: 700; vertical-align: middle;">TOTAL AMOUNT</td>
              <td style="padding: 24px 30px; color: #ffffff; font-size: 32px; font-weight: 900; text-align: right; vertical-align: middle;">৳${record.grandTotal.toLocaleString('en-US')}</td>
            </tr>
          </table>

          <table style="width: 100%; margin-top: 50px; border-top: 1.5px dashed #cbd5e1; border-collapse: collapse;">
            <tr>
              <td style="padding-top: 30px; text-align: center;">
                <div style="display: inline-block; margin-bottom: 6px;">
                  <span style="font-size: 15px; font-weight: 700; color: #475569;">${isFullyPaid ? 'Payment verified successfully' : 'Payment unverified'}</span>
                </div>
                <p style="margin: 0; font-size: 14px; color: #94a3b8; font-weight: 600;">Generated by <span style="color: #2563eb; font-weight: 800;">Eiyan Khan</span></p>
              </td>
            </tr>
          </table>
        </div>
      `;
    }

    // ==========================================
    // IMAGE RECEIPT DOWNLOAD
    // ==========================================
    window.downloadReceipt = async (id) => {
      const record = recordsData.find(r => r.id === id);
      if(!record) return;
      showToast("Generating Image...", "success");

      const isFullyPaid = (record.total1000x > 0 ? record.status1000x === 'Paid' : true) && 
                          (record.total615x > 0 ? record.status615x === 'Paid' : true);

      const wrapper = document.createElement('div');
      wrapper.style.position = 'absolute';
      wrapper.style.top = '-9999px';
      wrapper.style.left = '-9999px';
      wrapper.innerHTML = generateReceiptHTML(record, isFullyPaid);
      document.body.appendChild(wrapper);

      try {
        const canvas = await html2canvas(wrapper.querySelector('#receiptContent'), { scale: 2.5, useCORS: true, logging: false, backgroundColor: "#ffffff" });
        const link = document.createElement('a');
        link.download = `Receipt_${record.userName.replace(/\s+/g, '_')}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      } catch(err) { 
        console.error(err); 
        showToast("Error generating image", "error");
      }
      document.body.removeChild(wrapper);
    };

    // ==========================================
    // PDF RECEIPT DOWNLOAD
    // ==========================================
    window.downloadPDF = async (id) => {
      const record = recordsData.find(r => r.id === id);
      if(!record) return;
      showToast("Generating PDF...", "success");

      const isFullyPaid = (record.total1000x > 0 ? record.status1000x === 'Paid' : true) && 
                          (record.total615x > 0 ? record.status615x === 'Paid' : true);

      const wrapper = document.createElement('div');
      wrapper.style.position = 'absolute';
      wrapper.style.top = '-9999px';
      wrapper.style.left = '-9999px';
      wrapper.innerHTML = generateReceiptHTML(record, isFullyPaid);
      document.body.appendChild(wrapper);

      const element = wrapper.querySelector('#receiptContent');
      const opt = {
        margin:       0.2,
        filename:     `Receipt_${record.userName.replace(/\s+/g, '_')}.pdf`,
        image:        { type: 'jpeg', quality: 1 },
        html2canvas:  { scale: 2, useCORS: true },
        jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' }
      };

      try {
        await html2pdf().set(opt).from(element).save();
        document.body.removeChild(wrapper);
        showToast("PDF Downloaded", "success");
      } catch(err) {
        console.error(err); 
        document.body.removeChild(wrapper);
        showToast("Error generating PDF", "error");
      }
    };

    // Initialize App
    setTodayDate();
    syncDataFromSheet(); // Load data on startup
  </script>
</body>
</html>
