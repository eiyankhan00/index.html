<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Payment Tracker</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- html2canvas for Image Download -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <!-- html2pdf for PDF Download -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    
    :root {
      --primary: #0ea5e9;
      --bg-color: #0f172a;
      --surface: #1e293b;
      --surface-border: #334155;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    html, body {
      height: 100%;
      height: 100dvh; 
      color-scheme: dark;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-x: hidden;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar { display: none; }
    
    .tab-content { display: none; animation: fadeIn 0.3s ease-in-out; }
    .tab-content.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .input-field {
      width: 100%;
      padding: 12px 16px;
      background-color: #0b1120;
      border: 1.5px solid var(--surface-border);
      border-radius: 12px;
      font-size: 15px;
      color: var(--text-main);
      outline: none;
      transition: all 0.2s;
    }
    .input-field::placeholder { color: #64748b; }
    .input-field:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15);
    }
    
    .calc-input { text-align: center; font-weight: 600; }

    .nav-item { color: var(--text-muted); transition: all 0.2s cubic-bezier(0.34, 1.15, 0.64, 1); }
    .nav-item.active { color: var(--primary); transform: translateY(-4px) scale(1.05); }
    .nav-item.active .nav-icon-bg { background-color: rgba(14, 165, 233, 0.15); border-radius: 12px; padding: 4px 16px; }
    
    .loader {
      border: 3px solid #334155; border-radius: 50%; border-top: 3px solid var(--primary);
      width: 20px; height: 20px; animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* CSS transition for details animation */
    .details-panel {
      transition: max-height 0.4s cubic-bezier(0.34, 1.15, 0.64, 1), opacity 0.3s ease-in-out, margin-top 0.3s ease-in-out;
    }

    /* Spring Animation for newly loaded cards */
    @keyframes springFadeIn {
      0% { opacity: 0; transform: translateY(40px) scale(0.9); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    .new-record-anim {
      animation: springFadeIn 0.5s cubic-bezier(0.34, 1.15, 0.64, 1) both;
    }

    .record-wrapper {
      transform-origin: top center;
    }

    /* Recent Apps style smooth collapse & delete */
    .record-wrapper.removing {
      transition: all 0.4s cubic-bezier(0.34, 1.15, 0.64, 1);
      transform: scale(0.5) translateX(-100vw) !important;
      opacity: 0;
      max-height: 0 !important;
      margin-bottom: 0 !important;
      border-width: 0 !important;
    }

    /* Dynamic Island Toast */
    .toast-wrapper {
      transition: all 0.5s cubic-bezier(0.34, 1.15, 0.64, 1);
      max-height: 0;
      opacity: 0;
      transform: translateY(-40px) scale(0.5);
      margin-top: 0;
      display: flex;
      justify-content: center;
      width: 100%;
      pointer-events: none;
    }
    .toast-wrapper.toast-show {
      max-height: 100px; 
      opacity: 1;
      transform: translateY(0) scale(1);
      margin-top: 14px;
      pointer-events: auto;
    }

    /* Bouncy Touch Feedback */
    .ios-bounce {
      transition: transform 0.3s cubic-bezier(0.34, 1.15, 0.64, 1), opacity 0.3s cubic-bezier(0.34, 1.15, 0.64, 1), background-color 0.2s;
    }
    .ios-bounce:active {
      transform: scale(0.96); 
      opacity: 0.8;
      transition: transform 0.05s ease-out, opacity 0.05s ease-out;
    }

    /* FAST BOUNCE FOR SAVE BUTTON */
    .save-bounce {
      transition: transform 0.4s cubic-bezier(0.34, 1.15, 0.64, 1), background-color 0.2s;
    }
    .save-bounce:active {
      transform: scale(0.94);
      transition: transform 0.02s ease-out; 
    }

    /* Premium Search Panel */
    .search-panel {
      transition: max-height 0.4s cubic-bezier(0.34, 1.15, 0.64, 1), 
                  opacity 0.3s ease-in-out, 
                  margin-bottom 0.4s cubic-bezier(0.34, 1.15, 0.64, 1),
                  transform 0.4s cubic-bezier(0.34, 1.15, 0.64, 1);
      transform-origin: top center;
    }
  </style>
</head>
<body class="antialiased flex flex-col h-[100dvh] overflow-hidden">

  <!-- Top App Bar -->
  <header class="bg-[#1e293b] border-b border-[#334155] pt-10 pb-4 px-5 shadow-md flex justify-between items-center z-10 shrink-0 relative">
    <div>
      <div class="flex items-center gap-2 mb-0.5">
        <h1 class="text-xl font-bold tracking-wide text-white">Payment Tracker</h1>
        <span id="connIndicator" class="flex h-2.5 w-2.5 relative" title="Checking connection...">
          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-slate-500 opacity-75"></span>
          <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-slate-400"></span>
        </span>
      </div>
      <p class="text-sky-400 text-xs font-medium" id="syncStatus"><i class="fa-solid fa-arrows-rotate fa-spin"></i> Initializing...</p>
    </div>
    
    <!-- Total Paid Amount Header Widget -->
    <div class="bg-emerald-500/10 border border-emerald-500/20 px-3 py-1.5 rounded-xl flex flex-col items-end justify-center shadow-sm">
      <span class="text-[9px] font-bold text-emerald-500/70 uppercase tracking-wider leading-none mb-1">Total Paid</span>
      <span id="headerTotalPaid" class="text-base font-black text-emerald-400 leading-none">৳0</span>
    </div>
  </header>

  <!-- Dynamic Island Toast Container (Fixed at top) -->
  <div id="toast-container" class="fixed top-16 left-0 right-0 z-50 flex flex-col items-center pointer-events-none px-4"></div>

  <!-- Main Scrollable Content -->
  <main class="flex-1 min-h-0 overflow-y-auto pb-32 overflow-x-hidden relative" id="main-scroll">
    
    <!-- ==================== TAB 1: NEW ENTRY ==================== -->
    <div id="tab-new" class="tab-content active space-y-5 max-w-md mx-auto px-4 pt-5">
      <form id="paymentForm" class="space-y-5">
        
        <div class="bg-[#1e293b] p-5 rounded-2xl shadow-sm border border-[#334155] space-y-4">
          <h2 class="text-sm font-bold text-white border-b border-[#334155] pb-2 mb-3">
            <i class="fa-solid fa-file-invoice text-sky-400 mr-1"></i> Basic Details
          </h2>
          <div>
            <label class="block text-xs font-semibold text-slate-400 mb-1.5 ml-1">Date</label>
            <input type="date" id="dateInput" required class="input-field">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-400 mb-1.5 ml-1">Customer Name</label>
            <input type="text" id="userName" placeholder="Enter full name" required class="input-field">
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-xs font-semibold text-slate-400 mb-1.5 ml-1">Method</label>
              <select id="method" class="input-field appearance-none">
                <option value="bKash">bKash</option>
                <option value="Nagad">Nagad</option>
                <option value="Rocket">Rocket</option>
                <option value="Binance">Binance</option>
              </select>
            </div>
            <div>
              <label class="block text-xs font-semibold text-slate-400 mb-1.5 ml-1">Account A/C</label>
              <input type="tel" id="number" placeholder="017XXXXXXX" required class="input-field font-mono text-sm">
            </div>
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-400 mb-1.5 ml-1">Main Transaction ID <span class="font-normal opacity-70">(Optional)</span></label>
            <input type="text" id="trxId" placeholder="Paste TrxID" class="input-field font-mono text-sm uppercase">
          </div>
        </div>

        <!-- 1000x Box -->
        <div class="bg-[#1e293b] p-5 rounded-2xl border border-[#334155]">
          <div class="flex justify-between items-center mb-3">
            <h3 class="font-bold text-sky-400 text-sm"><i class="fa-solid fa-gamepad mr-1"></i> 1000x ID</h3>
            <span class="text-xs font-bold bg-sky-500/20 text-sky-400 border border-sky-500/30 px-2 py-1 rounded-md" id="sub1000x">৳ 0</span>
          </div>
          <div class="grid grid-cols-2 gap-3 mb-3">
            <div>
              <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 text-center">Quantity</label>
              <input type="number" id="qty1000x" placeholder="0" min="0" class="input-field calc-input">
            </div>
            <div>
              <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 text-center">Rate (৳)</label>
              <input type="number" id="rate1000x" placeholder="0.00" min="0" step="0.01" class="input-field calc-input">
            </div>
          </div>
          <!-- Player ID Input for 1000x -->
          <div>
            <input type="text" id="playerId1000x" placeholder="Player ID / Due ID (Optional)" class="input-field text-sm py-2.5 border-dashed border-[#475569] focus:border-solid focus:border-sky-500 text-sky-100 placeholder-slate-500">
          </div>
        </div>

        <!-- 615x Box -->
        <div class="bg-[#1e293b] p-5 rounded-2xl border border-[#334155]">
          <div class="flex justify-between items-center mb-3">
            <h3 class="font-bold text-sky-400 text-sm"><i class="fa-solid fa-gamepad mr-1"></i> 615x ID</h3>
            <span class="text-xs font-bold bg-sky-500/20 text-sky-400 border border-sky-500/30 px-2 py-1 rounded-md" id="sub615x">৳ 0</span>
          </div>
          <div class="grid grid-cols-2 gap-3 mb-3">
            <div>
              <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 text-center">Quantity</label>
              <input type="number" id="qty615x" placeholder="0" min="0" class="input-field calc-input">
            </div>
            <div>
              <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 text-center">Rate (৳)</label>
              <input type="number" id="rate615x" placeholder="0.00" min="0" step="0.01" class="input-field calc-input">
            </div>
          </div>
          <!-- Player ID Input for 615x -->
          <div>
            <input type="text" id="playerId615x" placeholder="Player ID / Due ID (Optional)" class="input-field text-sm py-2.5 border-dashed border-[#475569] focus:border-solid focus:border-sky-500 text-sky-100 placeholder-slate-500">
          </div>
        </div>

        <div class="pt-2 pb-6">
          <div class="bg-[#0b1120] border border-[#334155] border-b-0 text-white p-4 rounded-t-2xl flex justify-between items-center">
            <span class="text-sm font-medium text-slate-400 uppercase tracking-wider">Grand Total</span>
            <span id="grandTotalDisplay" class="text-2xl font-bold tracking-tight text-sky-400">৳ 0</span>
          </div>
          <button type="submit" id="submitBtn" class="w-full py-4 bg-sky-500 active:bg-sky-600 text-white font-bold rounded-b-2xl shadow-[0_4px_14px_rgba(14,165,233,0.3)] flex justify-center items-center gap-2 text-lg save-bounce">
            <i class="fa-solid fa-check-circle"></i> Save Record
          </button>
        </div>
      </form>
    </div>

    <!-- ==================== TAB 2: HISTORY ==================== -->
    <div id="tab-history" class="tab-content w-full max-w-md mx-auto">
      
      <!-- Sticky Header with Search Icon and Receipt Theme Toggle -->
      <div id="historyHeader" class="sticky top-0 bg-[#0f172a] pt-5 pb-2 px-4 z-30 transition-transform duration-300 w-full">
        <div class="flex justify-between items-center mb-2">
          <div class="flex items-center gap-2">
            <h2 class="text-sm font-bold text-slate-300">History</h2>
            <span id="recordCount" class="bg-sky-500/20 border border-sky-500/30 text-sky-400 text-[10px] font-bold px-2 py-0.5 rounded-full" title="Total Records">0</span>
          </div>
          <div class="flex items-center gap-2">
            <!-- Search Toggle Button (Bouncy) -->
            <button onclick="toggleSearch()" id="searchToggleBtn" class="text-[12px] bg-[#1e293b] text-sky-400 border border-sky-500/30 w-8 h-8 rounded-full font-bold active:bg-[#334155] flex items-center justify-center shadow-sm ios-bounce">
              <i class="fa-solid fa-magnifying-glass"></i>
            </button>
            <button onclick="toggleReceiptTheme()" id="themeToggleBtn" class="text-[10px] bg-[#1e293b] text-sky-400 border border-sky-500/30 px-3 py-1.5 rounded-full font-bold active:bg-[#334155] flex items-center gap-1.5 whitespace-nowrap ios-bounce">
              <i class="fa-solid fa-moon"></i> Dark Receipt
            </button>
          </div>
        </div>

        <!-- Premium Search Panel -->
        <div id="searchContainer" class="search-panel overflow-hidden" style="max-height: 0px; opacity: 0; margin-bottom: 0px; transform: translateY(-10px) scale(0.95);">
          <div class="bg-[#1e293b] p-3 rounded-xl border border-[#334155] shadow-sm space-y-3">
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                <i class="fa-solid fa-user text-xs"></i>
              </div>
              <input type="text" id="searchName" placeholder="Search by name or ID..." class="w-full pl-8 pr-3 py-2 bg-[#0b1120] border border-[#334155] text-white placeholder-slate-500 rounded-lg focus:border-sky-500 outline-none text-sm">
            </div>
            
            <div class="flex gap-2">
              <div class="relative flex-1">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                  <i class="fa-solid fa-phone text-xs"></i>
                </div>
                <input type="tel" id="searchNumber" placeholder="Number..." class="w-full pl-8 pr-3 py-2 bg-[#0b1120] border border-[#334155] text-white placeholder-slate-500 rounded-lg focus:border-sky-500 outline-none text-sm">
              </div>
              <div class="relative flex-1">
                <input type="date" id="searchDate" class="w-full px-2 py-2 bg-[#0b1120] border border-[#334155] text-slate-300 rounded-lg focus:border-sky-500 outline-none text-[13px]">
              </div>
            </div>
            
            <div class="flex justify-end">
              <button onclick="clearFilters()" class="text-[10px] bg-slate-700/50 text-slate-300 border border-slate-600 px-3 py-1.5 rounded-md font-bold active:bg-slate-600 ios-bounce">
                <i class="fa-solid fa-rotate-left mr-1"></i> Reset Filters
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Main History Records List -->
      <div class="px-4 pt-2 pb-6 w-full">
        <div id="emptyState" class="hidden bg-[#1e293b] p-10 text-center rounded-2xl border border-[#334155] shadow-sm mt-4">
          <div class="w-16 h-16 bg-[#0b1120] rounded-full flex items-center justify-center mx-auto mb-3">
            <i class="fa-solid fa-box-open text-2xl text-slate-600"></i>
          </div>
          <p class="font-medium text-slate-300 text-sm">No records found yet.</p>
          <p class="text-xs text-slate-500 mt-1">Add a new entry to see it here.</p>
        </div>

        <div id="recordsContainer" class="w-full flex flex-col"></div>
      </div>
    </div>
  </main>

  <!-- Bottom Navigation -->
  <nav class="bg-[#1e293b] border-t border-[#334155] flex justify-around items-center pt-3 pb-5 shrink-0 z-20 relative">
    <button onclick="switchTab('new')" id="nav-new" class="nav-item active flex flex-col items-center gap-1 w-20 pt-1">
      <div class="nav-icon-bg flex flex-col items-center"><i class="fa-solid fa-plus text-lg"></i></div>
      <span class="text-[10px] font-bold uppercase mt-1">New Entry</span>
    </button>
    <button onclick="switchTab('history')" id="nav-history" class="nav-item flex flex-col items-center gap-1 w-20 pt-1">
      <div class="nav-icon-bg flex flex-col items-center"><i class="fa-solid fa-list text-lg"></i></div>
      <span class="text-[10px] font-bold uppercase mt-1">History</span>
    </button>
  </nav>

  <!-- Delete Confirmation Modal -->
  <div id="confirm-modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 hidden flex items-center justify-center opacity-0 transition-opacity duration-300 px-4">
    <div class="bg-[#1e293b] border border-[#334155] rounded-2xl shadow-xl w-full max-w-xs p-6 transform scale-95 transition-transform duration-300 text-center">
      <div class="w-16 h-16 bg-red-500/10 border border-red-500/30 rounded-full flex items-center justify-center mx-auto mb-4 text-red-400 text-3xl">
        <i class="fa-solid fa-trash-can"></i>
      </div>
      <h3 class="text-lg font-bold text-white mb-1">Delete Record?</h3>
      <p class="text-slate-400 mb-6 text-sm">Are you sure you want to delete this record? It cannot be restored.</p>
      <div class="flex gap-3">
        <button id="confirm-cancel" class="flex-1 py-3 text-slate-300 bg-[#334155] font-bold rounded-xl active:bg-slate-600 ios-bounce text-sm">No</button>
        <button id="confirm-ok" class="flex-1 py-3 bg-red-500/10 text-red-400 border border-red-500/30 font-bold rounded-xl active:bg-red-500/20 ios-bounce text-sm">Yes, Delete</button>
      </div>
    </div>
  </div>

  <script>
    const apiKey = ""; 

    // ==========================================
    // GOOGLE SHEETS URL & STATE
    // ==========================================
    const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbwLo4sl_VxRbxkvp3wXbN0k0jh2NhOJSR6-YxXXXCdtiG3kYgOasAEKEAcZxzpQBuRg_g/exec"; 
    
    const STORAGE_KEY = 'paymentTrackerMobile_Data';
    let recordsData = [];
    let editingId = null;
    let expandedRecordIds = new Set(); 
    let renderedRecordIds = new Set(); 

    const parseStatus = (str) => {
      const s = String(str || '');
      const parts = s.split('::');
      return { status: parts[0] || 'N/A', playerId: parts[1] || '', itemTrxId: parts[2] || '' };
    };

    const buildStatus = (status, playerId, itemTrxId) => {
      return `${status}::${playerId || ''}::${itemTrxId || ''}`;
    };

    function toggleReceiptTheme() {
      const btn = document.getElementById('themeToggleBtn');
      if(receiptTheme === 'dark') {
        receiptTheme = 'light';
        btn.innerHTML = `<i class="fa-solid fa-sun"></i> Light Receipt`;
        btn.className = "text-[10px] bg-slate-200 text-slate-700 border border-slate-300 px-3 py-1.5 rounded-full font-bold active:bg-slate-300 flex items-center gap-1.5 shadow-sm whitespace-nowrap ios-bounce";
        showToast("Light Theme Selected", "info");
      } else {
        receiptTheme = 'dark';
        btn.innerHTML = `<i class="fa-solid fa-moon"></i> Dark Receipt`;
        btn.className = "text-[10px] bg-[#1e293b] text-sky-400 border border-sky-500/30 px-3 py-1.5 rounded-full font-bold active:bg-[#334155] flex items-center gap-1.5 whitespace-nowrap ios-bounce";
        showToast("Dark Theme Selected", "info");
      }
    }
    window.toggleReceiptTheme = toggleReceiptTheme;

    function toggleSearch() {
      const container = document.getElementById('searchContainer');
      const btnIcon = document.querySelector('#searchToggleBtn i');
      
      if (container.style.maxHeight === '0px' || !container.style.maxHeight) {
        container.style.maxHeight = '250px'; 
        container.style.opacity = '1';
        container.style.marginBottom = '12px';
        container.style.transform = 'translateY(0) scale(1)';
        btnIcon.className = 'fa-solid fa-times'; 
      } else {
        container.style.maxHeight = '0px';
        container.style.opacity = '0';
        container.style.marginBottom = '0px';
        container.style.transform = 'translateY(-10px) scale(0.95)';
        btnIcon.className = 'fa-solid fa-magnifying-glass'; 
      }
    }
    window.toggleSearch = toggleSearch;

    const getNextId = () => {
      if (recordsData.length === 0) return 1;
      const ids = recordsData.map(r => Number(r.id) || 0);
      return Math.max(...ids) + 1;
    };

    const updateConnectionUI = (isOnline) => {
      const connIndicator = document.getElementById('connIndicator');
      const syncStatus = document.getElementById('syncStatus');
      
      if(isOnline) {
        connIndicator.innerHTML = `
          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
          <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.8)]"></span>
        `;
        syncStatus.innerHTML = '<i class="fa-solid fa-link text-emerald-400"></i> Connected';
      } else {
        connIndicator.innerHTML = `
          <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.8)]"></span>
        `;
        syncStatus.innerHTML = '<i class="fa-solid fa-link-slash text-red-400"></i> Offline';
      }
    };

    const normalizeDateData = (records) => {
      return records.map(r => {
        let raw = r.displayDate || r.date; 
        let standard = '';
        let display = raw;

        if (raw) {
          let d;
          if (typeof raw === 'string' && raw.includes('-') && raw.length === 10) {
            const parts = raw.split('-');
            d = new Date(parts[0], parts[1] - 1, parts[2]);
          } else {
            d = new Date(raw);
          }

          if (!isNaN(d.getTime())) {
            const yyyy = d.getFullYear();
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const dd = String(d.getDate()).padStart(2, '0');
            standard = `${yyyy}-${mm}-${dd}`;
            
            const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            display = `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
          }
        }
        
        let numStr = String(r.number || '').replace(/[^0-9+]/g, '');
        if(numStr.length === 10 && !numStr.startsWith('+')) numStr = '0' + numStr;

        return { ...r, date: standard, displayDate: display, number: numStr };
      });
    };

    const syncDataFromSheet = async () => {

        updateConnectionUI(false);
        loadLocalData();
        return;

        const response = await fetch(GOOGLE_SHEET_URL);
        const result = await response.json();
        
        if (result.status === 'success' && result.data) {
          recordsData = normalizeDateData(result.data);
          saveLocalData(); 
          updateConnectionUI(true);
        } else {
          updateConnectionUI(false);
        }

        loadLocalData();

      const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
      return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
    };

    // ==========================================
    // SWIPE TO DISMISS / DELETE LOGIC (Android 16 Hold-to-Delete)
    // ==========================================
    let swipeEventsAttached = false;
    function initSwipeToDismiss() {
        if (swipeEventsAttached) return;
        const container = document.getElementById('recordsContainer');
        if (!container) return;
        swipeEventsAttached = true;
        
        let activeCardInner = null;
        let activeWrapper = null;
        let startX = 0, startY = 0, currentX = 0;
        let isSwiping = false;
        
        let prevInner = null;
        let nextInner = null;

        let holdTimer = null;
        let deleteTriggered = false;

        container.addEventListener('touchstart', (e) => {
            const innerCard = e.target.closest('.record-card-inner');
            if (!innerCard) return;
            if (e.target.closest('button') || e.target.closest('input') || e.target.closest('.details-panel')) return;

            activeCardInner = innerCard;
            activeWrapper = activeCardInner.closest('.record-wrapper');
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
            isSwiping = false;
            deleteTriggered = false;
            if (holdTimer) clearTimeout(holdTimer);
            
            const prevWrapper = activeWrapper.previousElementSibling;
            const nextWrapper = activeWrapper.nextElementSibling;
            
            prevInner = prevWrapper ? prevWrapper.querySelector('.record-card-inner') : null;
            nextInner = nextWrapper ? nextWrapper.querySelector('.record-card-inner') : null;

            activeCardInner.style.transition = 'none';
            if (prevInner) prevInner.style.transition = 'none';
            if (nextInner) nextInner.style.transition = 'none';
        }, { passive: true });

        container.addEventListener('touchmove', (e) => {
            if (!activeCardInner || deleteTriggered) return;

            const diffX = e.touches[0].clientX - startX;
            const diffY = e.touches[0].clientY - startY;

            if (!isSwiping) {
                if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 10) {
                    isSwiping = true;
                } else if (Math.abs(diffY) > Math.abs(diffX) && Math.abs(diffY) > 10) {
                    activeCardInner = null;
                    return;
                }
            }

            if (isSwiping) {
                if (diffX < 0) { 
                    if(e.cancelable) e.preventDefault(); 
                    currentX = diffX;
                    
                    const translateVal = diffX > -100 ? diffX : -100 + (diffX + 100) * 0.25;
                    activeCardInner.style.transform = `translateX(${translateVal}px)`;

                    const pullForce = 0.08; 
                    const nudge = translateVal * pullForce;
                    
                    if (prevInner) prevInner.style.transform = `translateX(${nudge}px)`;
                    if (nextInner) nextInner.style.transform = `translateX(${nudge}px)`;

                    // NEW: If pulled past -80px and held, trigger delete
                    if (currentX < -80 && !holdTimer && !deleteTriggered) {
                        holdTimer = setTimeout(() => {
                            deleteTriggered = true;
                            
                            // Snap open smoothly
                            const springTransition = 'transform 0.4s cubic-bezier(0.34, 1.15, 0.64, 1)';
                            activeCardInner.style.transition = springTransition;
                            activeCardInner.style.transform = `translateX(-100px)`;

                            // Reset siblings
                            if (prevInner) {
                                prevInner.style.transition = springTransition;
                                prevInner.style.transform = 'translateX(0px)';
                            }
                            if (nextInner) {
                                nextInner.style.transition = springTransition;
                                nextInner.style.transform = 'translateX(0px)';
                            }

                            const id = Number(activeCardInner.getAttribute('data-id'));
                            const swipedElement = activeCardInner;
                            
                            if (typeof window.deleteRecord === 'function') {
                                window.deleteRecord(id, swipedElement);
                            }
                        }, 400); // 0.4 seconds hold to trigger
                    } else if (currentX >= -80 && holdTimer) {
                        // If moved back before timer ends, cancel the hold timer
                        clearTimeout(holdTimer);
                        holdTimer = null;
                    }
                }
            }
        }, { passive: false });

        container.addEventListener('touchend', (e) => {
            if (!activeCardInner || !isSwiping) return;
            
            if (holdTimer) {
                clearTimeout(holdTimer);
                holdTimer = null;
            }
            
            // If user just swiped and released quickly (didn't hold), always snap back
            if (!deleteTriggered) {
                const springTransition = 'transform 0.6s cubic-bezier(0.34, 1.3, 0.64, 1)';
                activeCardInner.style.transition = springTransition;
                activeCardInner.style.transform = `translateX(0px)`;

                if (prevInner) {
                    prevInner.style.transition = springTransition;
                    prevInner.style.transform = 'translateX(0px)';
                }
                if (nextInner) {
                    nextInner.style.transition = springTransition;
                    nextInner.style.transform = 'translateX(0px)';
                }
            }
            
            activeCardInner = null;
            activeWrapper = null;
            prevInner = null;
            nextInner = null;
            isSwiping = false;
            currentX = 0;
        });
    }

      renderRecords();
    };

    };

      try {
        await fetch(GOOGLE_SHEET_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ action: actionType, data: recordData })

    const rate1000x = document.getElementById('rate1000x');
    const playerId1000x = document.getElementById('playerId1000x');

    const playerId615x = document.getElementById('playerId615x'); 

    const calculateTotals = () => {
      const t1000x = (Number(qty1000x.value) || 0) * (Number(rate1000x.value) || 0);
      const t615x = (Number(qty615x.value) || 0) * (Number(rate615x.value) || 0);
      const total = t1000x + t615x;
      document.getElementById('sub1000x').innerText = `৳ ${t1000x.toLocaleString()}`;
      document.getElementById('sub615x').innerText = `৳ ${t615x.toLocaleString()}`;
      document.getElementById('grandTotalDisplay').innerText = `৳ ${total.toLocaleString()}`;
      return { t1000x, t615x, total };
    };

      const r1 = Number(rate1000x.value) || 0;
      const q2 = Number(qty615x.value) || 0;
      const r2 = Number(rate615x.value) || 0;
      let pid1 = playerId1000x.value.trim();
      let pid2 = playerId615x.value.trim();

      const isActive1 = q1 > 0 || r1 > 0 || pid1 !== '';
      const isActive2 = q2 > 0 || r2 > 0 || pid2 !== '';

      if (!isActive1 && !isActive2) {
        return showToast("Please enter amount, rate, or at least one ID", "error");
      }

      showToast("Saving data...", "info");

      const btn = document.getElementById('submitBtn');
      btn.innerHTML = '<div class="loader"></div> <span class="ml-2">Saving...</span>';
      btn.disabled = true;

      const rawDate = dateInput.value;
      const formattedDate = formatDate(rawDate);
      
      let stat1 = isActive1 ? 'Pending' : 'N/A';
      let stat2 = isActive2 ? 'Pending' : 'N/A';
      
      let itemTrx1 = '';
      let itemTrx2 = '';

      if (editingId) {
        const index = recordsData.findIndex(r => r.id === editingId);
        if (index !== -1) {
          const old1 = parseStatus(recordsData[index].status1000x);
          const old2 = parseStatus(recordsData[index].status615x);
          stat1 = isActive1 ? (old1.status !== 'N/A' ? old1.status : 'Pending') : 'N/A';
          stat2 = isActive2 ? (old2.status !== 'N/A' ? old2.status : 'Pending') : 'N/A';
          itemTrx1 = old1.itemTrxId;
          itemTrx2 = old2.itemTrxId;
        }
      }

      const recordToSave = {
        id: editingId || getNextId(),
        date: rawDate,
        displayDate: formattedDate,
        userName: userNameInput.value,
        method: methodInput.value,
        number: numberInput.value,
        trxId: trxIdInput.value.trim(),
        qty1000x: q1,
        rate1000x: r1,
        total1000x: totals.t1000x,
        qty615x: q2,
        rate615x: r2,
        total615x: totals.t615x,
        grandTotal: totals.total,
        status1000x: buildStatus(stat1, pid1, itemTrx1),
        status615x: buildStatus(stat2, pid2, itemTrx2)
      };

      if (editingId) {
        const index = recordsData.findIndex(r => r.id === editingId);
        if (index !== -1) {
          recordsData[index] = recordToSave;
        }
        sendActionToSheet('updateRecord', recordToSave).then(() => {
          showToast("Record Updated!", "update");
          resetForm();
        });
      } else {
        recordsData.unshift(recordToSave);
        sendActionToSheet('addRecord', recordToSave).then(() => {
          showToast("New Record Saved!", "save");
          resetForm();
        });
      }
    });

    const resetForm = () => {
      editingId = null;
      form.reset();
      setTodayDate();
      calculateTotals();
      const btn = document.getElementById('submitBtn');
      btn.innerHTML = `<i class="fa-solid fa-check-circle"></i> Save Record`;
      btn.className = "w-full py-4 bg-sky-500 active:bg-sky-600 text-white font-bold rounded-b-2xl shadow-[0_4px_14px_rgba(14,165,233,0.3)] flex justify-center items-center gap-2 text-lg save-bounce";
      btn.disabled = false;
      
      renderedRecordIds.clear();
      switchTab('history');
    };

    function editRecord(id) {
      const r = recordsData.find(r => r.id === id);
      if (!r) return;
      editingId = id;
      dateInput.value = r.date || '';
      userNameInput.value = r.userName;
      methodInput.value = r.method;
      numberInput.value = r.number;
      trxIdInput.value = r.trxId || '';
      
      const p1000 = parseStatus(r.status1000x);
      const p615 = parseStatus(r.status615x);

      qty1000x.value = r.qty1000x || '';
      rate1000x.value = r.rate1000x || '';
      playerId1000x.value = p1000.playerId;
      
      qty615x.value = r.qty615x || '';
      rate615x.value = r.rate615x || '';
      playerId615x.value = p615.playerId;
      
      calculateTotals();
      switchTab('new');
      
      const btn = document.getElementById('submitBtn');
      btn.innerHTML = `<i class="fa-solid fa-pen-to-square"></i> Update Record`;
      btn.className = "w-full py-4 bg-emerald-500 active:bg-emerald-600 text-white font-bold rounded-b-2xl shadow-[0_4px_14px_rgba(16,185,129,0.3)] flex justify-center items-center gap-2 text-lg save-bounce";
    }
    window.editRecord = editRecord;

    function deleteRecord(id, swipedCardElement = null) {
      const innerCard = swipedCardElement || document.querySelector(`.record-card-inner[data-id="${id}"]`);

      showConfirmModal(
        () => {
          const wrapper = document.getElementById(`record-wrapper-${id}`);
          if (wrapper) {
            wrapper.style.height = wrapper.offsetHeight + 'px'; 
            wrapper.style.marginBottom = '1rem'; 
            void wrapper.offsetWidth;
            wrapper.classList.add('removing'); 

            setTimeout(() => {
              recordsData = recordsData.filter(r => r.id !== id);
              renderRecords(); 
              sendActionToSheet('deleteRecord', { id: id }).then(() => {
                showToast("Record Deleted!", "delete");
              });
            }, 400);
          } else {
            recordsData = recordsData.filter(r => r.id !== id);
            renderRecords(); 
            sendActionToSheet('deleteRecord', { id: id }).then(() => {
              showToast("Record Deleted!", "delete");
            });
          }
        },
        () => {
          if (innerCard) {
            innerCard.style.transform = 'translateX(0px)';
          }
        }
      );
    }
    window.deleteRecord = deleteRecord;

    function updateStatus(id, type, status) {
      const cardInner = document.querySelector(`.record-card-inner[data-id="${id}"]`);
      if (cardInner) {
        cardInner.style.transition = 'transform 0.15s cubic-bezier(0.4, 0, 0.2, 1)';
        cardInner.style.transform = 'scale(0.98)';
        
        const wrapper = cardInner.closest('.record-wrapper');
        if(wrapper && wrapper.nextElementSibling) {
          wrapper.nextElementSibling.style.transition = 'transform 0.15s cubic-bezier(0.4, 0, 0.2, 1)';
          wrapper.nextElementSibling.style.transform = 'translateY(-2px)';
        }
        if(wrapper && wrapper.previousElementSibling) {
          wrapper.previousElementSibling.style.transition = 'transform 0.15s cubic-bezier(0.4, 0, 0.2, 1)';
          wrapper.previousElementSibling.style.transform = 'translateY(2px)';
        }
      }

      setTimeout(() => {
        const idx = recordsData.findIndex(r => r.id === id);
        if (idx !== -1) {
          const parsed = parseStatus(recordsData[idx]['status' + type]);
          
          const inlineTrxInput = document.getElementById(`inline-trx-${id}-${type}`);
          let newItemTrxId = parsed.itemTrxId;
          
          if (inlineTrxInput && inlineTrxInput.value.trim() !== '') {
            newItemTrxId = inlineTrxInput.value.trim();
          }

          recordsData[idx]['status' + type] = buildStatus(status, parsed.playerId, newItemTrxId);
          
          saveLocalData(); 
          sendActionToSheet('updateRecord', recordsData[idx]);
          
          showToast(status === 'Paid' ? "Payment Marked as Paid!" : "Payment Rejected!", status === 'Paid' ? "paid" : "reject");
        }
      }, 150);
    }
    window.updateStatus = updateStatus;

    // ==========================================
    // MODERN HTML GENERATOR FOR RECEIPTS 
    // ==========================================
    const generateReceiptHTML = (record, isFullyPaid, isRejected) => {
      const th = receiptTheme === 'dark' ? {
        bg: '#0f172a', text: '#f8fafc', muted: '#94a3b8', border: '#334155', cardBg: '#1e293b', primary: '#0ea5e9', totalBg: '#0ea5e9', totalText: '#ffffff', trxBg: '#022c22', trxBorder: '#059669', trxText: '#34d399', badgePaidText: '#34d399', badgePendingText: '#fbbf24'
      } : {
        bg: '#ffffff', text: '#0f172a', muted: '#64748b', border: '#e2e8f0', cardBg: '#f8fafc', primary: '#2563eb', totalBg: '#0f172a', totalText: '#ffffff', trxBg: '#ecfdf5', trxBorder: '#10b981', trxText: '#047857', badgePaidText: '#059669', badgePendingText: '#d97706'
      };

      let overallStatusHtml = '';
      if (isRejected) {
          overallStatusHtml = `<div style="color: #ef4444; font-size: 14px; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; margin-top: 4px;">✕ PAYMENT REJECTED</div>`;
      } else if (isFullyPaid) {
          overallStatusHtml = `<div style="color: ${th.badgePaidText}; font-size: 14px; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; margin-top: 4px;">✓ PAID IN FULL</div>`;
      } else {
          overallStatusHtml = `<div style="color: ${th.badgePendingText}; font-size: 14px; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; margin-top: 4px;">⏱ PAYMENT DUE</div>`;
      }

      const p1000 = parseStatus(record.status1000x);
      const p615 = parseStatus(record.status615x);
      
      const getReceiptStatusHelper = (status) => {
          if (status === 'Paid') return {text: '✓ PAID', color: th.badgePaidText};
          if (status === 'Rejected') return {text: '✕ REJECTED', color: '#ef4444'};
          return {text: '⏱ DUE', color: th.badgePendingText};
      };

      const s1000 = getReceiptStatusHelper(p1000.status);
      const s615 = getReceiptStatusHelper(p615.status);

      return `
        <div id="receiptContent" style="width: 540px; padding: 40px; background: ${th.bg}; font-family: 'Inter', sans-serif; color: ${th.text}; border: 1px solid ${th.border}; box-sizing: border-box;">
          
          <table style="width: 100%; border-bottom: 2px dashed ${th.border}; padding-bottom: 25px; margin-bottom: 30px; border-collapse: collapse;">
            <tr>
              <td style="vertical-align: middle;">
                <h1 style="margin: 0 0 8px 0; font-size: 32px; font-weight: 900; letter-spacing: -1px; color: ${th.primary};">RECEIPT</h1>
                ${overallStatusHtml}
              </td>
              <td style="vertical-align: middle; text-align: right;">
                <div style="color: ${th.muted}; font-size: 10px; text-transform: uppercase; font-weight: 800; letter-spacing: 1.5px; margin-bottom: 4px;">Date</div>
                <div style="font-size: 16px; font-weight: 800; color: ${th.text};">${record.displayDate || 'N/A'}</div>
              </td>
            </tr>
          </table>

          ${record.trxId ? `
          <div style="background: ${th.trxBg}; border: 1px dashed ${th.trxBorder}; padding: 16px; border-radius: 12px; text-align: center; margin-bottom: 30px;">
            <p style="margin: 0; color: ${th.trxBorder}; font-size: 11px; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; margin-bottom: 4px;">Main Transaction ID</p>
            <p style="margin: 0; font-size: 20px; font-weight: 800; color: ${th.trxText}; font-family: monospace; letter-spacing: 1px;">${record.trxId}</p>
          </div>
          ` : ''}

          <table style="width: 100%; background: ${th.cardBg}; border-radius: 16px; margin-bottom: 35px; border-collapse: collapse; overflow: hidden;">
            <tr>
              <td style="width: 50%; padding: 24px; border-right: 1px solid ${th.border}; vertical-align: top;">
                <p style="margin: 0 0 8px 0; color: ${th.muted}; font-size: 10px; text-transform: uppercase; font-weight: 800; letter-spacing: 1px;">Billed To</p>
                <p style="margin: 0; font-size: 20px; font-weight: 800; color: ${th.text}; line-height: 1.3;">${record.userName}</p>
              </td>
              <td style="width: 50%; padding: 24px; text-align: center; vertical-align: top;">
                <p style="margin: 0 0 8px 0; color: ${th.muted}; font-size: 10px; text-transform: uppercase; font-weight: 800; letter-spacing: 1px;">Payment Method</p>
                <p style="margin: 0; font-size: 18px; font-weight: 800; color: ${th.text}; margin-bottom: 2px;">${record.method}</p>
                <p style="margin: 0; color: ${th.primary}; font-weight: 800; font-size: 16px; font-family: monospace; letter-spacing: 1px;">${record.number}</p>
              </td>
            </tr>
          </table>

          <table style="width: 100%; border-collapse: collapse; margin-bottom: 10px;">
            <tr>
              <td style="padding-bottom: 12px; font-size: 11px; color: ${th.muted}; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; border-bottom: 2px solid ${th.border};">Item Details</td>
              <td style="padding-bottom: 12px; font-size: 11px; color: ${th.muted}; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; text-align: center; width: 140px; border-bottom: 2px solid ${th.border};">Qty × Rate</td>
              <td style="padding-bottom: 12px; font-size: 11px; color: ${th.muted}; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; text-align: right; width: 110px; border-bottom: 2px solid ${th.border};">Subtotal</td>
            </tr>
          </table>

          <table style="width: 100%; border-collapse: collapse; margin-bottom: 40px;">
            <tbody>
              ${p1000.status !== 'N/A' ? `
              <tr>
                <td style="padding: 20px 0; border-bottom: 1px solid ${th.border}; vertical-align: middle;">
                  <div style="font-weight: 800; font-size: 16px; color: ${th.text}; margin-bottom: ${p1000.playerId ? '4px' : '6px'};">1000x ID</div>
                  ${p1000.playerId ? `<div style="font-size: 12px; color: ${th.muted}; font-family: monospace; margin-bottom: 4px; font-weight: 600;">ID: ${p1000.playerId}</div>` : ''}
                  ${p1000.itemTrxId ? `<div style="font-size: 11px; color: ${th.primary}; font-family: monospace; margin-bottom: 8px; font-weight: 600;">Trx: ${p1000.itemTrxId}</div>` : ''}
                  <div><span style="color: ${s1000.color}; font-weight: 900; font-size: 12px; letter-spacing: 1px; text-transform: uppercase;">${s1000.text}</span></div>
                </td>
                <td style="padding: 20px 0; border-bottom: 1px solid ${th.border}; text-align: center; color: ${th.text}; font-weight: 700; font-size: 15px;">
                  ${record.total1000x > 0 ? `${record.qty1000x} <span style="color: ${th.muted}; font-size: 14px; margin: 0 4px;">×</span> ৳${record.rate1000x}` : `<span style="color: ${th.muted}; font-size: 12px;">--</span>`}
                </td>
                <td style="padding: 20px 0; border-bottom: 1px solid ${th.border}; text-align: right; font-weight: 800; font-size: 17px; color: ${th.text};">
                  ${record.total1000x > 0 ? `৳${record.total1000x.toLocaleString('en-US')}` : `<span style="color: ${th.muted}; font-size: 12px;">--</span>`}
                </td>
              </tr>
              ` : ''}
              ${p615.status !== 'N/A' ? `
              <tr>
                <td style="padding: 20px 0; border-bottom: 1px solid ${th.border}; vertical-align: middle;">
                  <div style="font-weight: 800; font-size: 16px; color: ${th.text}; margin-bottom: ${p615.playerId ? '4px' : '6px'};">615x ID</div>
                  ${p615.playerId ? `<div style="font-size: 12px; color: ${th.muted}; font-family: monospace; margin-bottom: 4px; font-weight: 600;">ID: ${p615.playerId}</div>` : ''}
                  ${p615.itemTrxId ? `<div style="font-size: 11px; color: ${th.primary}; font-family: monospace; margin-bottom: 8px; font-weight: 600;">Trx: ${p615.itemTrxId}</div>` : ''}
                  <div><span style="color: ${s615.color}; font-weight: 900; font-size: 12px; letter-spacing: 1px; text-transform: uppercase;">${s615.text}</span></div>
                </td>
                <td style="padding: 20px 0; border-bottom: 1px solid ${th.border}; text-align: center; color: ${th.text}; font-weight: 700; font-size: 15px;">
                  ${record.total615x > 0 ? `${record.qty615x} <span style="color: ${th.muted}; font-size: 14px; margin: 0 4px;">×</span> ৳${record.rate615x}` : `<span style="color: ${th.muted}; font-size: 12px;">--</span>`}
                </td>
                <td style="padding: 20px 0; border-bottom: 1px solid ${th.border}; text-align: right; font-weight: 800; font-size: 17px; color: ${th.text};">
                  ${record.total615x > 0 ? `৳${record.total615x.toLocaleString('en-US')}` : `<span style="color: ${th.muted}; font-size: 12px;">--</span>`}
                </td>
              </tr>
              ` : ''}
            </tbody>
          </table>

          <!-- Grand Total -->
          <div style="background: ${th.totalBg}; border-radius: 16px; padding: 24px 30px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; box-shadow: 0 10px 25px rgba(14, 165, 233, 0.2);">
            <div style="color: rgba(255,255,255,0.8); font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;">Total Amount</div>
            <div style="color: ${th.totalText}; font-size: 34px; font-weight: 900; letter-spacing: -1px;">৳${record.grandTotal.toLocaleString('en-US')}</div>
          </div>

          <!-- Footer -->
          <div style="text-align: center; border-top: 2px dashed ${th.border}; pt-8; padding-top: 30px;">
            <div style="display: inline-block; margin-bottom: 8px;">
              <span style="font-size: 14px; font-weight: 800; color: ${th.text}; letter-spacing: 0.5px;">${isRejected ? 'Payment Cancelled/Rejected' : (isFullyPaid ? 'Payment Verified Successfully' : 'Payment Unverified')}</span>
            </div>
            <p style="margin: 0; font-size: 12px; color: ${th.muted}; font-weight: 600;">Generated Securely by <span style="color: ${th.primary}; font-weight: 800;">MK NETWORK</span></p>
          </div>
        </div>
      `;
    };

    function downloadReceipt(id) {
      const record = recordsData.find(r => r.id === id);
      if(!record) return;
      showToast("Generating Image...", "info");

      let hasPending = false;
      let hasPaid = false;
      let hasRejected = false;

      const p1000 = parseStatus(record.status1000x);
      const p615 = parseStatus(record.status615x);

      if (p1000.status !== 'N/A') {
          if (p1000.status === 'Pending') hasPending = true;
          else if (p1000.status === 'Paid') hasPaid = true;
          else if (p1000.status === 'Rejected') hasRejected = true;
      }
      if (p615.status !== 'N/A') {
          if (p615.status === 'Pending') hasPending = true;
          else if (p615.status === 'Paid') hasPaid = true;
          else if (p615.status === 'Rejected') hasRejected = true;
      }

      let isFullyPaid = false;
      let isRejected = false;

      if (hasPending) {
          isFullyPaid = false;
      } else if (hasPaid && !hasRejected) {
          isFullyPaid = true;
      } else if (hasRejected && !hasPaid) {
          isRejected = true;
      } else if (hasPaid && hasRejected) {
          isFullyPaid = true; 
      }

      const wrapper = document.createElement('div');
      wrapper.style.position = 'absolute';
      wrapper.style.top = '-9999px';
      wrapper.style.left = '-9999px';
      wrapper.innerHTML = generateReceiptHTML(record, isFullyPaid, isRejected);
      document.body.appendChild(wrapper);

      try {
        const bgVal = receiptTheme === 'dark' ? '#0f172a' : '#ffffff';
        html2canvas(wrapper.querySelector('#receiptContent'), { scale: 2.5, useCORS: true, logging: false, backgroundColor: bgVal }).then(canvas => {
            const link = document.createElement('a');
            link.download = `Receipt_${record.userName.replace(/\s+/g, '_')}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            document.body.removeChild(wrapper);
        }).catch(err => {
            showToast("Error generating image", "error");
            document.body.removeChild(wrapper);
        });
      } catch(err) { 
        showToast("Error generating image", "error");
        document.body.removeChild(wrapper);
      }
    }
    window.downloadReceipt = downloadReceipt;

    function downloadPDF(id) {
      const record = recordsData.find(r => r.id === id);
      if(!record) return;
      showToast("Generating PDF...", "info");

      let hasPending = false;
      let hasPaid = false;
      let hasRejected = false;

      const p1000 = parseStatus(record.status1000x);
      const p615 = parseStatus(record.status615x);

      if (p1000.status !== 'N/A') {
          if (p1000.status === 'Pending') hasPending = true;
          else if (p1000.status === 'Paid') hasPaid = true;
          else if (p1000.status === 'Rejected') hasRejected = true;
      }
      if (p615.status !== 'N/A') {
          if (p615.status === 'Pending') hasPending = true;
          else if (p615.status === 'Paid') hasPaid = true;
          else if (p615.status === 'Rejected') hasRejected = true;
      }

      let isFullyPaid = false;
      let isRejected = false;

      if (hasPending) {
          isFullyPaid = false;
      } else if (hasPaid && !hasRejected) {
          isFullyPaid = true;
      } else if (hasRejected && !hasPaid) {
          isRejected = true;
      } else if (hasPaid && hasRejected) {
          isFullyPaid = true; 
      }

      const wrapper = document.createElement('div');
      wrapper.style.position = 'absolute';
      wrapper.style.top = '-9999px';
      wrapper.style.left = '-9999px';
      wrapper.innerHTML = generateReceiptHTML(record, isFullyPaid, isRejected);
      document.body.appendChild(wrapper);

      const element = wrapper.querySelector('#receiptContent');
      const opt = {
        margin:       0.2,
        filename:     `Receipt_${record.userName.replace(/\s+/g, '_')}.pdf`,
        image:        { type: 'jpeg', quality: 1 },
        html2canvas:  { scale: 2, useCORS: true },
        jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' }
      };

      try {
        html2pdf().set(opt).from(element).save().then(() => {
            document.body.removeChild(wrapper);
            showToast("PDF Downloaded", "save");
        }).catch(err => {
            document.body.removeChild(wrapper);
            showToast("Error generating PDF", "error");
        });
      } catch(err) {
        document.body.removeChild(wrapper);
        showToast("Error generating PDF", "error");
      }
    }
    window.downloadPDF = downloadPDF;

    setTodayDate();
    syncDataFromSheet(); 
  </script>
</body>
</html>
