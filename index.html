<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Tracker Pro</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- html2canvas for Receipt Download -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f8fafc;
    }
    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    /* Animations */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes slideOutRight {
      from { opacity: 1; transform: translateX(0); height: auto; }
      to { opacity: 0; transform: translateX(50px); height: 0; padding: 0; margin: 0; border: none; overflow: hidden; }
    }
    @keyframes valuePop {
      0% { transform: scale(1); }
      50% { transform: scale(1.15); color: #3b82f6; }
      100% { transform: scale(1); }
    }
    
    .animate-fade-in-up { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .animate-scale-in { animation: scaleIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .animate-slide-out { animation: slideOutRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .animate-value-pop { animation: valuePop 0.3s ease-out; display: inline-block; }
    
    .delay-100 { animation-delay: 100ms; }
    .delay-200 { animation-delay: 200ms; }

    input, select { transition: all 0.2s ease-in-out; }
    input:focus, select:focus {
      transform: scale(1.01);
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.1);
    }
  </style>
</head>
<body class="text-slate-800 antialiased min-h-screen pb-12">

  <div class="max-w-6xl mx-auto p-4 md:p-8 space-y-6">
    
    <!-- Header -->
    <header class="flex flex-col md:flex-row md:items-center justify-between gap-4 pb-6 border-b border-slate-200 animate-fade-in-up">
      <div class="flex items-center gap-4">
        <div class="bg-gradient-to-br from-blue-600 to-indigo-600 p-4 rounded-xl shadow-lg shadow-blue-200 text-white transform hover:scale-105 transition-transform duration-300">
          <i class="fa-solid fa-wallet text-2xl"></i>
        </div>
        <div>
          <h1 class="text-2xl md:text-3xl font-bold text-slate-900 tracking-tight">Payment Tracker</h1>
          <p class="text-sm text-slate-500 font-medium">Manage IDs, track payments & generate receipts</p>
        </div>
      </div>
      
      <!-- Backup/Restore -->
      <div class="flex gap-2 bg-white p-2 rounded-xl shadow-sm border border-slate-200">
        <button onclick="exportData()" class="px-4 py-2 bg-emerald-50 text-emerald-700 hover:bg-emerald-100 font-semibold text-sm rounded-lg transition-colors flex items-center gap-2 hover:scale-105 active:scale-95 duration-200">
          <i class="fa-solid fa-cloud-arrow-down"></i> Backup Data
        </button>
        <label class="cursor-pointer px-4 py-2 bg-blue-50 text-blue-700 hover:bg-blue-100 font-semibold text-sm rounded-lg transition-colors flex items-center gap-2 hover:scale-105 active:scale-95 duration-200">
          <i class="fa-solid fa-cloud-arrow-up"></i> Restore Data
          <input type="file" id="importFile" accept=".json" class="hidden" onchange="importData(event)">
        </label>
      </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      
      <!-- Form Section -->
      <div class="lg:col-span-1 animate-fade-in-up delay-100">
        <div class="bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200 sticky top-6 hover:shadow-md transition-shadow duration-300">
          <h2 class="text-lg font-bold mb-5 flex items-center gap-2 text-slate-800 border-b border-slate-100 pb-3">
            <i class="fa-solid fa-circle-plus text-blue-600"></i> New Record
          </h2>
          
          <form id="paymentForm" class="space-y-5">
            <div class="space-y-4">
              <div>
                <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1.5 flex items-center gap-1.5">
                  <i class="fa-regular fa-calendar text-blue-500"></i> Date
                </label>
                <input type="text" id="dateInput" placeholder="e.g., 22 March 2026" required
                  class="w-full px-4 py-2.5 bg-amber-50 border-2 border-amber-300 rounded-xl focus:ring-4 focus:ring-amber-500/20 focus:border-amber-500 outline-none font-semibold text-slate-800 transition-all">
              </div>

              <div>
                <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1.5">User Name</label>
                <input type="text" id="userName" placeholder="Enter full name" required
                  class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all">
              </div>
              
              <div class="grid grid-cols-2 gap-3">
                <div>
                  <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1.5">Method</label>
                  <select id="method" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none appearance-none cursor-pointer transition-all">
                    <option value="bKash">bKash</option>
                    <option value="Nagad">Nagad</option>
                    <option value="Rocket">Rocket</option>
                    <option value="Binance">Binance</option>
                  </select>
                </div>
                <div>
                  <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1.5">Account A/C</label>
                  <input type="text" id="number" placeholder="017XXXXXXX" required
                    class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all font-mono">
                </div>
              </div>

              <div>
                <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1.5">
                  Transaction ID <span class="text-slate-400 font-normal lowercase">(Optional)</span>
                </label>
                <input type="text" id="trxId" placeholder="Paste TrxID here"
                  class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 outline-none transition-all font-mono text-sm">
              </div>
            </div>

            <!-- ID 1000x -->
            <div class="bg-blue-50/50 p-4 rounded-xl border border-blue-100 space-y-3 transition-colors hover:border-blue-300">
              <h3 class="font-bold text-blue-800 text-sm flex items-center gap-2">
                <i class="fa-solid fa-tag"></i> ID Type: 1000x
              </h3>
              <div class="grid grid-cols-2 gap-3">
                <input type="number" id="qty1000x" placeholder="Qty" min="0" class="calc-input w-full px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm outline-none">
                <input type="number" id="rate1000x" placeholder="Rate" min="0" step="0.01" class="calc-input w-full px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm outline-none">
              </div>
              <div class="text-right text-sm font-semibold text-slate-600">Subtotal: <span id="sub1000x" class="text-blue-600 font-bold">৳ 0</span></div>
            </div>

            <!-- ID 615x -->
            <div class="bg-purple-50/50 p-4 rounded-xl border border-purple-100 space-y-3 transition-colors hover:border-purple-300">
              <h3 class="font-bold text-purple-800 text-sm flex items-center gap-2">
                <i class="fa-solid fa-tag"></i> ID Type: 615x
              </h3>
              <div class="grid grid-cols-2 gap-3">
                <input type="number" id="qty615x" placeholder="Qty" min="0" class="calc-input w-full px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm outline-none">
                <input type="number" id="rate615x" placeholder="Rate" min="0" step="0.01" class="calc-input w-full px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm outline-none">
              </div>
              <div class="text-right text-sm font-semibold text-slate-600">Subtotal: <span id="sub615x" class="text-purple-600 font-bold">৳ 0</span></div>
            </div>

            <div class="pt-2">
              <div class="flex justify-between items-center mb-4 bg-slate-900 text-white p-4 rounded-xl shadow-md transform hover:scale-[1.02] transition-transform duration-300">
                <span class="text-sm font-medium opacity-80 uppercase tracking-wider">Grand Total</span>
                <span id="grandTotalDisplay" class="text-2xl font-bold tracking-tight">৳ 0</span>
              </div>
              <div id="formActions" class="flex flex-col">
                <button type="submit" id="submitBtn" 
                  class="w-full py-3.5 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl transition-all duration-300 shadow-md flex justify-center items-center gap-2 hover:-translate-y-1 active:scale-95">
                  <i class="fa-solid fa-plus"></i> Save Record
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>

      <!-- List Section -->
      <div class="lg:col-span-2 space-y-4 animate-fade-in-up delay-200">
        <h2 class="text-lg font-bold flex items-center gap-2 mb-4 text-slate-800">
          <i class="fa-solid fa-list-check text-slate-500"></i> Payment Records 
          <span id="recordCount" class="bg-blue-100 text-blue-800 text-xs px-2 py-0.5 rounded-full">0</span>
        </h2>

        <div class="relative mb-4">
          <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400">
            <i class="fa-solid fa-magnifying-glass"></i>
          </div>
          <input type="text" id="searchInput" placeholder="Search by date or name..." 
            class="w-full pl-10 pr-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none shadow-sm transition-all text-sm font-medium">
        </div>

        <div id="emptyState" class="hidden bg-white p-12 text-center rounded-2xl border border-slate-200 shadow-sm text-slate-400">
          <i class="fa-solid fa-folder-open text-5xl mb-4 opacity-20"></i>
          <p class="font-medium text-slate-500">No payment records found.</p>
        </div>

        <div id="recordsContainer" class="grid gap-4"></div>
      </div>
    </div>
  </div>

  <!-- Custom Toasts -->
  <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

  <!-- Custom Confirm Modal -->
  <div id="confirm-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden flex items-center justify-center opacity-0 transition-opacity duration-300">
    <div class="bg-white rounded-2xl shadow-xl max-w-sm w-full p-6 transform scale-95 transition-transform duration-300">
      <h3 class="text-xl font-bold text-slate-800 mb-2 flex items-center gap-2">
        <i class="fa-solid fa-triangle-exclamation text-amber-500"></i> Confirm Action
      </h3>
      <p class="text-slate-600 mb-6" id="confirm-message">Are you sure?</p>
      <div class="flex justify-end gap-3">
        <button id="confirm-cancel" class="px-4 py-2 text-slate-600 font-semibold hover:bg-slate-100 rounded-lg transition-colors">Cancel</button>
        <button id="confirm-ok" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white font-semibold rounded-lg transition-colors">Confirm</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'paymentTrackerData_pro';
    let recordsData = [];
    let editingId = null;

    // Toast Notification System
    const showToast = (message, type = 'error') => {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      const bg = type === 'error' ? 'bg-red-500' : (type === 'success' ? 'bg-emerald-500' : 'bg-blue-500');
      const icon = type === 'error' ? 'fa-circle-exclamation' : (type === 'success' ? 'fa-circle-check' : 'fa-circle-info');
      
      toast.className = `${bg} text-white px-5 py-3 rounded-xl shadow-lg transform transition-all duration-300 translate-y-10 opacity-0 flex items-center gap-3 font-medium text-sm pointer-events-auto`;
      toast.innerHTML = `<i class="fa-solid ${icon}"></i> ${message}`;
      
      container.appendChild(toast);

      setTimeout(() => {
        toast.classList.remove('translate-y-10', 'opacity-0');
      }, 10);

      setTimeout(() => {
        toast.classList.add('translate-y-10', 'opacity-0');
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    };

    // Confirm Modal System
    let confirmCallback = null;
    const showConfirm = (message, callback) => {
      document.getElementById('confirm-message').innerText = message;
      const modal = document.getElementById('confirm-modal');
      modal.classList.remove('hidden');
      setTimeout(() => {
        modal.classList.remove('opacity-0');
        modal.querySelector('div').classList.remove('scale-95');
      }, 10);
      confirmCallback = callback;
    };

    document.getElementById('confirm-cancel').addEventListener('click', () => {
      closeModal();
    });
    
    document.getElementById('confirm-ok').addEventListener('click', () => {
      if(confirmCallback) confirmCallback();
      closeModal();
    });

    const closeModal = () => {
      const modal = document.getElementById('confirm-modal');
      modal.classList.add('opacity-0');
      modal.querySelector('div').classList.add('scale-95');
      setTimeout(() => {
        modal.classList.add('hidden');
      }, 300);
    };

    // Core Logic
    const renderRecords = () => {
      const recordsContainer = document.getElementById('recordsContainer');
      const recordCount = document.getElementById('recordCount');
      const searchInput = document.getElementById('searchInput');
      const term = searchInput.value.toLowerCase().trim();
      
      const filtered = recordsData.filter(r => r.date.toLowerCase().includes(term) || r.userName.toLowerCase().includes(term));
      recordCount.innerText = filtered.length;
      
      if (filtered.length === 0) { 
        recordsContainer.innerHTML = ''; 
        document.getElementById('emptyState').classList.remove('hidden'); 
        return; 
      }
      document.getElementById('emptyState').classList.add('hidden');
      
      let html = '';
      filtered.forEach(record => {
        const renderAction = (type, total, status) => {
          if(total === 0) return '';
          let btns = status === 'Pending' ? `
            <div class="flex items-center gap-1.5 mt-2 sm:mt-0">
              <button onclick="updateStatus(${record.id}, '${type}', 'Paid')" class="px-3 py-1.5 bg-green-500 text-white rounded text-xs font-bold shadow-sm active:scale-95 transition-transform hover:scale-105">Accept</button>
              <button onclick="updateStatus(${record.id}, '${type}', 'Rejected')" class="px-3 py-1.5 bg-red-100 hover:bg-red-200 text-red-700 rounded text-xs font-bold active:scale-95 transition-colors">Reject</button>
            </div>` : `
            <span class="px-3 py-1 text-xs font-bold rounded-full mt-2 sm:mt-0 flex items-center gap-1 ${status === 'Paid' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
              <i class="fa-solid ${status === 'Paid' ? 'fa-check-circle' : 'fa-times-circle'}"></i> ${status}
            </span>`;
          return `<div class="flex flex-col sm:flex-row justify-between sm:items-center p-3 rounded-xl border ${type === '1000x' ? 'bg-blue-50/50 border-blue-100' : 'bg-purple-50/50 border-purple-100'}">
            <span class="text-sm font-semibold">${type} ID: ${record['qty'+type]} x ${record['rate'+type]} = ৳${total.toLocaleString()}</span>${btns}
          </div>`;
        };

        const mBadge = { bKash: 'bg-pink-100 text-pink-700', Nagad: 'bg-orange-100 text-orange-700', Rocket: 'bg-purple-100 text-purple-700', Binance: 'bg-yellow-100 text-yellow-800' }[record.method] || 'bg-slate-100 text-slate-700';

        html += `
          <div id="record-${record.id}" class="animate-scale-in bg-white rounded-2xl shadow-sm border border-slate-200 hover:border-blue-300 transition-all duration-300 p-4 md:p-5">
            <div class="flex justify-between items-start mb-4 border-b border-slate-100 pb-4">
              <div>
                <h3 class="text-lg font-bold">${record.userName}</h3>
                <div class="flex gap-2 mt-1.5">
                  <span class="${mBadge} px-2 py-0.5 rounded text-xs font-bold">${record.method}</span>
                  <span class="text-sm font-mono font-bold text-blue-600">${record.number}</span>
                </div>
                <div class="flex flex-wrap gap-2 mt-2.5">
                  <div class="px-2.5 py-1 bg-amber-50 border border-amber-200 text-amber-800 text-xs font-bold rounded-md"><i class="fa-regular fa-calendar"></i> ${record.date}</div>
                  ${record.trxId ? `<div class="px-2.5 py-1 bg-emerald-50 text-emerald-800 text-xs font-bold rounded-md">TrxID: ${record.trxId}</div>` : ''}
                </div>
              </div>
              <div class="flex gap-1">
                <button onclick="editRecord(${record.id})" class="text-slate-400 hover:text-blue-600 p-2 transition-all" title="Edit"><i class="fa-regular fa-pen-to-square"></i></button>
                <button onclick="deleteRecord(${record.id})" class="text-slate-400 hover:text-red-600 p-2 transition-all" title="Delete"><i class="fa-regular fa-trash-can"></i></button>
              </div>
            </div>
            <div class="space-y-3">${renderAction('1000x', record.total1000x, record.status1000x)}${renderAction('615x', record.total615x, record.status615x)}</div>
            <div class="mt-5 pt-4 border-t border-slate-100 flex justify-between items-center">
              <div><span class="text-xs font-bold text-slate-500 uppercase">Total Amount</span><div class="text-2xl font-black">৳${record.grandTotal.toLocaleString()}</div></div>
              <button onclick="downloadReceipt(${record.id})" class="px-4 py-2.5 bg-slate-800 hover:bg-slate-900 text-white text-sm font-semibold rounded-xl transition-all shadow-md flex items-center justify-center gap-2 hover:-translate-y-0.5 active:scale-95"><i class="fa-solid fa-file-arrow-down"></i> Download Receipt</button>
            </div>
          </div>`;
      });
      document.getElementById('recordsContainer').innerHTML = html;
    };

    const loadData = () => {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) recordsData = JSON.parse(saved);
      } catch (err) {}
      
      // Auto-set today's date if not set
      if (!document.getElementById('dateInput').value) {
        const d = new Date();
        const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        document.getElementById('dateInput').value = `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
      }
      
      renderRecords();
    };

    const saveData = () => {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(recordsData));
      renderRecords();
    };

    window.exportData = () => {
      if (recordsData.length === 0) {
        return showToast("No data available to backup!", "error");
      }
      const dataStr = JSON.stringify(recordsData, null, 2);
      const blob = new Blob([dataStr], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `Backup_${new Date().toISOString().split('T')[0]}.json`;
      a.click();
      showToast("Data backed up successfully!", "success");
    };

    window.importData = (event) => {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const imported = JSON.parse(e.target.result);
          if (Array.isArray(imported)) {
            const existingIds = new Set(recordsData.map(r => r.id));
            let importedCount = 0;
            imported.forEach(item => { 
              if(!existingIds.has(item.id)) {
                recordsData.push(item); 
                importedCount++;
              }
            });
            recordsData.sort((a, b) => b.id - a.id);
            saveData();
            showToast(`Successfully imported ${importedCount} records.`, "success");
          } else {
            showToast("Invalid backup file format.", "error");
          }
        } catch (err) {
          showToast("Failed to parse backup file.", "error");
        }
      };
      reader.readAsText(file);
      event.target.value = '';
    };

    const form = document.getElementById('paymentForm');
    const dateInput = document.getElementById('dateInput');
    const userNameInput = document.getElementById('userName');
    const methodInput = document.getElementById('method');
    const numberInput = document.getElementById('number');
    const trxIdInput = document.getElementById('trxId');
    const qty1000x = document.getElementById('qty1000x');
    const rate1000x = document.getElementById('rate1000x');
    const qty615x = document.getElementById('qty615x');
    const rate615x = document.getElementById('rate615x');

    const calculateTotals = () => {
      const t1000x = (Number(qty1000x.value) || 0) * (Number(rate1000x.value) || 0);
      const t615x = (Number(qty615x.value) || 0) * (Number(rate615x.value) || 0);
      const total = t1000x + t615x;
      document.getElementById('sub1000x').innerText = `৳ ${t1000x.toLocaleString()}`;
      document.getElementById('sub615x').innerText = `৳ ${t615x.toLocaleString()}`;
      document.getElementById('grandTotalDisplay').innerText = `৳ ${total.toLocaleString()}`;
      return { t1000x, t615x, total };
    };

    document.querySelectorAll('.calc-input').forEach(input => input.addEventListener('input', calculateTotals));

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const totals = calculateTotals();
      if (totals.total === 0) {
        return showToast("Please enter valid quantity and rate for at least one item!", "error");
      }

      if (editingId) {
        const index = recordsData.findIndex(r => r.id === editingId);
        if (index !== -1) {
          recordsData[index] = {
            ...recordsData[index],
            date: dateInput.value,
            userName: userNameInput.value,
            method: methodInput.value,
            number: numberInput.value,
            trxId: trxIdInput.value.trim(),
            qty1000x: Number(qty1000x.value) || 0,
            rate1000x: Number(rate1000x.value) || 0,
            total1000x: totals.t1000x,
            qty615x: Number(qty615x.value) || 0,
            rate615x: Number(rate615x.value) || 0,
            total615x: totals.t615x,
            grandTotal: totals.total,
          };
          showToast("Record updated successfully!", "success");
        }
        window.cancelEdit();
        saveData();
      } else {
        const newRecord = {
          id: Date.now(),
          date: dateInput.value,
          userName: userNameInput.value,
          method: methodInput.value,
          number: numberInput.value,
          trxId: trxIdInput.value.trim(),
          qty1000x: Number(qty1000x.value) || 0,
          rate1000x: Number(rate1000x.value) || 0,
          total1000x: totals.t1000x,
          qty615x: Number(qty615x.value) || 0,
          rate615x: Number(rate615x.value) || 0,
          total615x: totals.t615x,
          grandTotal: totals.total,
          status1000x: totals.t1000x > 0 ? 'Pending' : 'N/A',
          status615x: totals.t615x > 0 ? 'Pending' : 'N/A',
        };
        recordsData.unshift(newRecord);
        saveData();
        showToast("New record saved successfully!", "success");
        
        // Preserve date when resetting
        const currentDate = dateInput.value;
        form.reset();
        dateInput.value = currentDate;
        calculateTotals();
      }
    });

    window.editRecord = (id) => {
      const r = recordsData.find(r => r.id === id);
      if (!r) return;
      editingId = id;
      dateInput.value = r.date;
      userNameInput.value = r.userName;
      methodInput.value = r.method;
      numberInput.value = r.number;
      trxIdInput.value = r.trxId || '';
      qty1000x.value = r.qty1000x || '';
      rate1000x.value = r.rate1000x || '';
      qty615x.value = r.qty615x || '';
      rate615x.value = r.rate615x || '';
      calculateTotals();
      const btn = document.getElementById('submitBtn');
      btn.innerHTML = '<i class="fa-solid fa-pen-to-square"></i> Update Record';
      btn.className = "w-full py-3.5 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-xl shadow-md flex justify-center items-center gap-2 hover:-translate-y-1 active:scale-95 transition-all duration-300";
      
      // Add a cancel button if it doesn't exist
      if(!document.getElementById('cancelEditBtn')) {
        const formActions = document.getElementById('formActions');
        const cancelBtn = document.createElement('button');
        cancelBtn.type = 'button';
        cancelBtn.id = 'cancelEditBtn';
        cancelBtn.onclick = window.cancelEdit;
        cancelBtn.innerHTML = '<i class="fa-solid fa-xmark"></i> Cancel Edit';
        cancelBtn.className = "w-full mt-3 py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold rounded-xl shadow-sm flex justify-center items-center gap-2 transition-all duration-300";
        formActions.appendChild(cancelBtn);
      }
      
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    window.updateStatus = (id, type, status) => {
      const idx = recordsData.findIndex(r => r.id === id);
      if (idx !== -1) {
        if (type === '1000x') recordsData[idx].status1000x = status;
        if (type === '615x') recordsData[idx].status615x = status;
        saveData();
      }
    };

    window.deleteRecord = (id) => {
      showConfirm("Are you sure you want to delete this payment record?", () => {
        recordsData = recordsData.filter(r => r.id !== id);
        saveData();
        showToast("Record deleted successfully.", "success");
      });
    };

    window.cancelEdit = () => {
      editingId = null;
      const currentDate = dateInput.value;
      form.reset();
      dateInput.value = currentDate;
      calculateTotals();
      const btn = document.getElementById('submitBtn');
      btn.innerHTML = '<i class="fa-solid fa-plus"></i> Save Record';
      btn.className = "w-full py-3.5 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl transition-all duration-300 shadow-md flex justify-center items-center gap-2 hover:-translate-y-1 active:scale-95";
      
      const cancelBtn = document.getElementById('cancelEditBtn');
      if(cancelBtn) cancelBtn.remove();
    };

    window.downloadReceipt = async (id) => {
      const record = recordsData.find(r => r.id === id);
      if(!record) return;

      const isFullyPaid = (record.total1000x > 0 ? record.status1000x === 'Paid' : true) && 
                          (record.total615x > 0 ? record.status615x === 'Paid' : true);

      const wrapper = document.createElement('div');
      wrapper.style.position = 'absolute';
      wrapper.style.top = '-9999px';
      wrapper.style.left = '-9999px';
      
      const getStatusBadge = (status) => {
        if(status === 'Paid') return `<div style="color: #059669; font-weight: 800; background: #ecfdf5; padding: 6px 14px; border-radius: 24px; font-size: 11px; line-height: 1; display: inline-block; border: 1px solid #a7f3d0; letter-spacing: 0.5px;">PAID</div>`;
        return `<div style="color: #d97706; font-weight: 800; background: #fffbeb; padding: 6px 14px; border-radius: 24px; font-size: 11px; line-height: 1; display: inline-block; border: 1px solid #fde68a; letter-spacing: 0.5px;">PENDING</div>`;
      };

      wrapper.innerHTML = `
        <div id="receiptContent" style="width: 540px; padding: 40px; background: #ffffff; font-family: 'Inter', sans-serif; color: #0f172a;">
          
          <!-- Header Table -->
          <table style="width: 100%; border-bottom: 2px solid #f1f5f9; padding-bottom: 25px; margin-bottom: 30px; border-collapse: collapse;">
            <tr>
              <td style="vertical-align: middle;">
                <h1 style="margin: 0; font-size: 26px; font-weight: 800; letter-spacing: -0.5px;">RECEIPT</h1>
                <div style="margin-top: 4px;">
                  ${isFullyPaid 
                    ? '<span style="color: #059669; font-size: 14px; font-weight: 800; letter-spacing: 0.5px;">Payment Confirmed</span>' 
                    : '<span style="color: #d97706; font-size: 14px; font-weight: 800; letter-spacing: 0.5px;">Payment Pending</span>'}
                </div>
              </td>
              <td style="vertical-align: middle; text-align: right;">
                <div style="color: #64748b; font-size: 10px; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; margin-bottom: 4px;">DATE</div>
                <div style="font-size: 16px; font-weight: 800; color: #0f172a;">${record.date || 'N/A'}</div>
              </td>
            </tr>
          </table>

          <!-- Transaction ID Table -->
          ${record.trxId ? `
          <table style="width: 100%; margin-bottom: 30px; border-collapse: collapse;">
            <tr>
              <td style="background: #ecfdf5; border: 1.5px dashed #10b981; padding: 18px; border-radius: 12px; text-align: center;">
                <p style="margin: 0; color: #047857; font-size: 12px; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; margin-bottom: 4px;">TRANSACTION ID</p>
                <p style="margin: 0; font-size: 20px; font-weight: 800; color: #064e3b; font-family: monospace;">${record.trxId}</p>
              </td>
            </tr>
          </table>
          ` : ''}

          <!-- Info Table -->
          <table style="width: 100%; background: #f8fafc; border-radius: 12px; border: 1.5px solid #e2e8f0; margin-bottom: 40px; border-collapse: collapse;">
            <tr>
              <td style="width: 50%; padding: 25px; border-right: 2px solid #e2e8f0; text-align: center; vertical-align: top;">
                <p style="margin: 0 0 8px 0; color: #64748b; font-size: 11px; text-transform: uppercase; font-weight: 800;">CUSTOMER NAME</p>
                <p style="margin: 0; font-size: 20px; font-weight: 800; color: #0f172a;">${record.userName}</p>
              </td>
              <td style="width: 50%; padding: 25px; text-align: center; vertical-align: top;">
                <p style="margin: 0 0 8px 0; color: #64748b; font-size: 11px; text-transform: uppercase; font-weight: 800;">ACCOUNT DETAILS</p>
                <p style="margin: 0; font-size: 18px; font-weight: 800; color: #0f172a; margin-bottom: 2px;">${record.method}</p>
                <p style="margin: 0; color: #2563eb; font-weight: 900; font-size: 18px; font-family: monospace;">${record.number}</p>
              </td>
            </tr>
          </table>

          <!-- Items Details -->
          <table style="width: 100%; border-collapse: collapse; margin-bottom: 10px;">
            <tr>
              <td style="padding-bottom: 12px; font-size: 12px; color: #64748b; text-transform: uppercase; font-weight: 800;">ITEM DETAILS</td>
              <td style="padding-bottom: 12px; font-size: 12px; color: #64748b; text-transform: uppercase; font-weight: 800; text-align: center; width: 150px;">QTY X RATE</td>
              <td style="padding-bottom: 12px; font-size: 12px; color: #64748b; text-transform: uppercase; font-weight: 800; text-align: right; width: 100px;">TOTAL</td>
            </tr>
          </table>
          <div style="border-bottom: 2px solid #e2e8f0; margin-bottom: 15px;"></div>

          <table style="width: 100%; border-collapse: collapse; margin-bottom: 40px;">
            <tbody>
              ${record.total1000x > 0 ? `
              <tr>
                <td style="padding: 18px 0; vertical-align: middle;">
                  <span style="font-weight: 800; font-size: 16px;">1000x ID</span><br>
                  <div style="margin-top: 6px;">${getStatusBadge(record.status1000x)}</div>
                </td>
                <td style="padding: 18px 0; text-align: center; color: #475569; font-weight: 700; font-size: 17px;">${record.qty1000x} × ৳${record.rate1000x}</td>
                <td style="padding: 18px 0; text-align: right; font-weight: 800; font-size: 18px;">৳${record.total1000x.toLocaleString('en-US')}</td>
              </tr>
              <tr><td colspan="3" style="border-bottom: 1px solid #f1f5f9;"></td></tr>
              ` : ''}
              ${record.total615x > 0 ? `
              <tr>
                <td style="padding: 18px 0; vertical-align: middle;">
                  <span style="font-weight: 800; font-size: 16px;">615x ID</span><br>
                  <div style="margin-top: 6px;">${getStatusBadge(record.status615x)}</div>
                </td>
                <td style="padding: 18px 0; text-align: center; color: #475569; font-weight: 700; font-size: 17px;">${record.qty615x} × ৳${record.rate615x}</td>
                <td style="padding: 18px 0; text-align: right; font-weight: 800; font-size: 18px;">৳${record.total615x.toLocaleString('en-US')}</td>
              </tr>
              <tr><td colspan="3" style="border-bottom: 1px solid #f1f5f9;"></td></tr>
              ` : ''}
            </tbody>
          </table>

          <!-- Grand Total Bar -->
          <table style="width: 100%; background: #0f172a; border-radius: 14px; border-collapse: collapse;">
            <tr>
              <td style="padding: 24px 30px; color: #94a3b8; font-size: 18px; font-weight: 700; vertical-align: middle;">
                 TOTAL AMOUNT
              </td>
              <td style="padding: 24px 30px; color: #ffffff; font-size: 32px; font-weight: 900; text-align: right; vertical-align: middle;">
                ৳${record.grandTotal.toLocaleString('en-US')}
              </td>
            </tr>
          </table>

          <!-- Footer Area -->
          <table style="width: 100%; margin-top: 50px; border-top: 1.5px dashed #cbd5e1; border-collapse: collapse;">
            <tr>
              <td style="padding-top: 30px; text-align: center;">
                <div style="display: inline-block; margin-bottom: 6px;">
                  <span style="font-size: 15px; font-weight: 700; color: #475569; vertical-align: middle;">${isFullyPaid ? 'Payment verified successfully' : 'Payment unverified'}</span>
                </div>
                <p style="margin: 0; font-size: 14px; color: #94a3b8; font-weight: 600;">Generated by <span style="color: #2563eb; font-weight: 800;">Eiyan Khan</span></p>
              </td>
            </tr>
          </table>
          
        </div>
      `;

      document.body.appendChild(wrapper);

      try {
        const canvas = await html2canvas(wrapper.querySelector('#receiptContent'), { 
          scale: 2.5, 
          useCORS: true, 
          logging: false,
          backgroundColor: "#ffffff"
        });
        const link = document.createElement('a');
        link.download = `Receipt_${record.userName.replace(/\s+/g, '_')}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      } catch(err) { 
        console.error(err); 
        showToast("Error generating receipt", "error");
      }
      document.body.removeChild(wrapper);
    };

    document.getElementById('searchInput').addEventListener('input', renderRecords);
    loadData();
  </script>
</body>
</html>
